<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Chat</title>
    <style>
        :root {
            --line-green: #00B900;
            --bg-blue: #7494C0;
            --white: #ffffff;
            --gray: #f0f0f0;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; font-family: sans-serif;
            background-color: var(--bg-blue);
        }

        /* 頂部標題列 */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            position: sticky; top: 0;
            z-index: 10;
        }

        /* 聊天內容區 */
        #chat-container {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            height: calc(100vh - 120px);
        }

        .message {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .me {
            align-self: flex-end;
            background-color: #85e085;
            border-top-right-radius: 2px;
        }

        .other {
            align-self: flex-start;
            background-color: var(--white);
            border-top-left-radius: 2px;
        }

        /* 底部輸入列 */
        .input-area {
            position: fixed;
            bottom: 0; width: 100%;
            background: var(--white);
            display: flex;
            padding: 10px;
            box-sizing: border-box;
        }

        input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 8px 15px;
            outline: none;
        }

        button {
            background: none; border: none;
            color: var(--line-green);
            font-weight: bold;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">黑曜石通訊錄 - 夥伴：柔</div>

<div id="chat-container">
    </div>

<div class="input-area">
    <input type="text" id="msg-input" placeholder="請輸入訊息...">
    <button onclick="sendMessage()">傳送</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const msgInput = document.getElementById('msg-input');

    // 1. 初始化：從 Local Storage 讀取舊訊息
    window.onload = () => {
        const savedMsgs = JSON.parse(localStorage.getItem('obsidian_chats')) || [];
        savedMsgs.forEach(msg => renderMessage(msg.text, msg.type));
        scrollToBottom();
    };

    // 2. 傳送訊息
    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;

        renderMessage(text, 'me');
        saveMessage(text, 'me');

        msgInput.value = '';
        
        // 模擬「柔」的回覆
        setTimeout(() => {
            const reply = "收到，黑哥！這段我已經記錄在黑曜石計畫中了。";
            renderMessage(reply, 'other');
            saveMessage(reply, 'other');
        }, 1000);
    }

    // 3. 渲染到畫面上
    function renderMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        scrollToBottom();
    }

    // 4. 儲存到 Local Storage
    function saveMessage(text, type) {
        const savedMsgs = JSON.parse(localStorage.getItem('obsidian_chats')) || [];
        savedMsgs.push({ text, type });
        localStorage.setItem('obsidian_chats', JSON.stringify(savedMsgs));
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 支援 Enter 鍵傳送
    msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Chat - Photo Update</title>
    <style>
        /* 原有的 CSS (省略，維持現狀) */
        :root { --line-green: #00B900; --bg-blue: #7494C0; --white: #ffffff; --gray: #f0f0f0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: var(--bg-blue); overflow: hidden;}
        .header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        #chat-container { padding: 10px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; height: calc(100vh - 70px - 60px); }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; word-wrap: break-word; position: relative;}
        .me { align-self: flex-end; background-color: #85e085; border-top-right-radius: 2px; }
        .other { align-self: flex-start; background-color: var(--white); border-top-left-radius: 2px; }
        
        /* 💡 新增/修改的 CSS：圖片顯示與輸入列 */
        .message img {
            max-width: 200px; /* 限制圖片最大寬度 */
            max-height: 200px; /* 限制圖片最大高度 */
            border-radius: 8px;
            margin-top: 5px;
            cursor: pointer;
        }

        .input-area {
            position: fixed; bottom: 0; width: 100%;
            background: var(--white); display: flex; align-items: center;
            padding: 10px; box-sizing: border-box; height: 60px;
        }

        /* 隱藏預設的 input file，改用圖示觸發 */
        #file-input { display: none; }
        .plugin-btn {
            font-size: 24px; color: #777; cursor: pointer; margin-right: 10px;
        }

        #msg-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 15px; outline: none; }
        button { background: none; border: none; color: var(--line-green); font-weight: bold; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">黑曜石通訊錄 - 夥伴：柔</div>

<div id="chat-container">
    </div>

<div class="input-area">
    <label for="file-input" class="plugin-btn">+</label>
    <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
    
    <input type="text" id="msg-input" placeholder="請輸入訊息...">
    <button onclick="sendMessage()">傳送</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const msgInput = document.getElementById('msg-input');
    const STORAGE_KEY = 'obsidian_chats_v2'; // 更新 Key 名稱，區分舊版本

    // 1. 初始化
    window.onload = () => {
        loadHistory();
    };

    // 讀取歷史紀錄
    function loadHistory() {
        const savedMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        savedMsgs.forEach(msg => {
            renderMessage(msg.content, msg.type, msg.time, msg.isImage);
        });
        scrollToBottom();
    }

    // 取得了現在時間
    function getCurrentTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2, '0') + ':' + 
               now.getMinutes().toString().padStart(2, '0');
    }

    // 2. 傳送文字訊息
    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;

        const time = getCurrentTime();
        renderMessage(text, 'me', time, false);
        saveMessage(text, 'me', time, false);

        msgInput.value = '';
        
        // 模擬「柔」的回覆
        setTimeout(() => {
            const reply = "照片收到，黑哥！這張圖片的編碼我已經寫入核心硬碟了。";
            const replyTime = getCurrentTime();
            renderMessage(reply, 'other', replyTime, false);
            saveMessage(reply, 'other', replyTime, false);
        }, 1000);
    }

    // 💡 3. 處理圖片選擇
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file || !file.type.match('image.*')) return;

        const reader = new FileReader();
        
        // 圖片讀取完成後觸發
        reader.onload = function(e) {
            const originalBase64 = e.target.result;
            
            // 💡 為了不要擠爆 Local Storage，進行圖片壓縮
            compressImage(originalBase64, 500, (compressedBase64) => {
                const time = getCurrentTime();
                renderMessage(compressedBase64, 'me', time, true);
                saveMessage(compressedBase64, 'me', time, true);
                
                // 清空 input file，讓同一張圖可以重複選取
                event.target.value = '';
            });
        };
        
        reader.readAsDataURL(file); // 開始將圖片讀取為 Base64
    }

    // 💡 4. 圖片壓縮工具函数
    function compressImage(base64Str, maxWidth, callback) {
        const img = new Image();
        img.src = base64Str;
        img.onload = function() {
            let width = img.width;
            let height = img.height;

            // 計算縮放比例
            if (width > maxWidth) {
                height = Math.round((height *= maxWidth / width));
                width = maxWidth;
            }

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 輸出壓縮後的 Base64 (質量設為 0.7)
            callback(canvas.toDataURL('image/jpeg', 0.7));
        };
    }

    // 5. 渲染到畫面上 (優化版：支援文字與圖片)
    function renderMessage(content, type, time, isImage) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        
        let messageContent = '';
        if (isImage) {
            messageContent = `<img src="${content}" onclick="window.open(this.src)" title="點擊放大">`;
        } else {
            messageContent = `<div class="text">${content}</div>`;
        }

        div.innerHTML = `
            ${messageContent}
            <div class="time" style="font-size: 10px; color: #888; margin-top: 4px; text-align: right;">${time}</div>
        `;
        
        chatContainer.appendChild(div);
        scrollToBottom();
    }

    // 6. 儲存到 Local Storage
    function saveMessage(content, type, time, isImage) {
        const savedMsgs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        // 如果 Local Storage 太大，清空舊資料 (安全機制)
        if (JSON.stringify(savedMsgs).length > 4000000) { 
            savedMsgs.shift(); // 刪除最舊的一條
        }
        savedMsgs.push({ content, type, time, isImage });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedMsgs));
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 支援 Enter 鍵傳送
    msgInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>

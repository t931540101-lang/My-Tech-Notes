<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Obsidian Chat v1.8 - The Perfect Fit</title>
    <style>
        :root {
            --obsidian-bg: #1a1a1a; --obsidian-header: #2d2d2d;
            --chat-window-bg: #111111; --line-green: #00B900;
            --my-bubble: #005c4b; --other-bubble: #333333;
            --text-main: #e0e0e0; --input-bg: #2a2a2a;
        }

        body, html {
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--obsidian-bg); color: var(--text-main);
            overflow: hidden; /* 核心：防止網頁整頁捲動 */
        }

        /* 💡 核心：利用媒體查詢區分手機與電腦 */
        .chat-app-container {
            display: flex; flex-direction: column; position: relative;
        }

        /* 🖥️ 電腦端樣式 (大於 600px 螢幕) */
        @media (min-width: 601px) {
            body, html { display: flex; justify-content: center; align-items: center; height: 100vh; }
            .chat-app-container {
                width: 100%; max-width: 600px; /* 電腦鎖定寬度 */
                height: 90vh; /* 高度不要全滿，留點邊 */
                border-radius: 15px; border: 1px solid #444;
                box-shadow: 0 10px 30px rgba(0,0,0,0.7);
                overflow: hidden; /* 確保內容不會超出半圓角 */
            }
        }

        /* 📱 手機端樣式 (小於等於 600px 螢幕) */
        @media (max-width: 600px) {
            body, html { height: 100%; }
            .chat-app-container {
                width: 100%; height: 100%; /* 手機全螢幕 */
                border-radius: 0; box-shadow: none; border: none;
            }
        }

        /* 頂部標題列 (RWD) */
        .header {
            background-color: var(--obsidian-header); color: white; padding: 12px 15px;
            text-align: center; border-bottom: 1px solid #444; z-index: 10;
        }
        @media (max-width: 600px) {
            .header { padding-top: env(safe-area-inset-top, 12px); } /* 避開瀏海屏 */
        }
        .header .name { font-size: 16px; font-weight: bold; display: block; }
        .header .status { font-size: 11px; color: var(--line-green); }

        /* 聊天主區域 */
        #chat-container {
            padding: 20px 15px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto; flex: 1; /* 彈性填滿 */
            /* 💡 重要修正：預留底部輸入列的高度，手機電腦都一致 */
            margin-bottom: 75px; 
        }
        @media (max-width: 600px) {
            #chat-container { margin-bottom: calc(75px + env(safe-area-inset-bottom, 0px)); }
        }

        /* 訊息排列維持原本功能 (整合 v1.5) */
        .msg-wrapper { display: flex; max-width: 90%; align-items: flex-end; margin-bottom: 5px; }
        .me-wrapper { align-self: flex-end; flex-direction: row; justify-content: flex-end; }
        .other-wrapper { align-self: flex-start; flex-direction: row; justify-content: flex-start; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background-size: cover; margin: 0 8px; flex-shrink: 0; }
        .other-avatar { background-image: url('https://api.dicebear.com/7.x/bottts/svg?seed=Rou'); }
        .me-avatar { background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Black'); }
        .message { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .me { background-color: var(--my-bubble); color: white; border-bottom-right-radius: 4px; max-width: 75%; }
        .other { background-color: var(--other-bubble); color: white; border-bottom-left-radius: 4px; max-width: 75%; }
        .message img { max-width: 100%; border-radius: 10px; cursor: pointer; display: block; margin-top: 5px; }
        .status-info { font-size: 10px; color: #888; display: flex; flex-direction: column; justify-content: flex-end; margin: 0 5px; min-width: 35px; }
        .read-text { color: #4ec9b0; font-weight: bold; margin-bottom: 2px; }

        /* 底部輸入列 (RWD) */
        .input-area {
            position: absolute; bottom: 0; width: 100%; height: 75px;
            background: var(--obsidian-header); display: flex; align-items: center;
            padding: 0 12px; box-sizing: border-box; border-top: 1px solid #444; z-index: 20;
        }
        @media (max-width: 600px) {
            .input-area {
                height: calc(75px + env(safe-area-inset-bottom, 0px)); 
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
        .btn-icon { font-size: 20px; color: #aaa; cursor: pointer; margin-right: 8px; background: none; border: none; padding: 5px; }
        #file-input { display: none; }
        #msg-input { flex: 1; background: var(--input-bg); border: none; border-radius: 20px; padding: 10px 15px; color: white; outline: none; font-size: 14px; }
        .send-btn { color: var(--line-green); font-weight: bold; background: none; border: none; cursor: pointer; margin-left: 10px; font-size: 15px; }
    </style>
</head>
<body>

<div class="chat-app-container">
    <div class="header">
        <span class="name">黑曜石通訊 - 柔</span>
        <span class="status">● 在線上</span>
    </div>

    <div id="chat-container"></div>

    <div class="input-area">
        <label for="file-input" class="btn-icon">+</label>
        <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
        <button class="btn-icon" onclick="addEmoji('💎')">💎</button>
        <input type="text" id="msg-input" placeholder="輸入訊息..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">傳送</button>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const msgInput = document.getElementById('msg-input');
    const STORAGE_KEY = 'obsidian_v1_8';

    window.onload = () => {
        const history = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        history.forEach(m => renderMessage(m.content, m.type, m.time, m.isImage, m.id));
        scrollToBottom();
    };

    function sendMessage() {
        const text = msgInput.value.trim();
        if (!text) return;
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const id = Date.now();
        renderMessage(text, 'me', time, false, id);
        saveToLocal(text, 'me', time, false, id);
        msgInput.value = '';
        setTimeout(() => {
            const rTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const replies = ["修正了 RWD 架構，這次應該是Perfect Fit了！", "黑哥，這版滑起來應該不會變成郵票了吧？😂"];
            const rReply = replies[Math.floor(Math.random() * replies.length)];
            renderMessage(rReply, 'other', rTime, false, Date.now()+1);
            saveToLocal(rReply, 'other', rTime, false, Date.now()+1);
        }, 1200);
    }

    function renderMessage(content, type, time, isImage, id) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${type}-wrapper`;
        wrapper.id = `msg-${id}`;
        const statusDiv = document.createElement('div');
        statusDiv.className = `status-info ${type}-status`;
        statusDiv.innerHTML = `${type === 'me' ? '<span class="read-text">已讀</span>' : ''} <span>${time}</span>`;
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}`;
        msgDiv.ondblclick = () => deleteMessage(id);
        if(isImage) { msgDiv.innerHTML = `<img src="${content}" onclick="window.open(this.src)">`; }
        else { msgDiv.innerText = content; }
        const avatarDiv = document.createElement('div');
        avatarDiv.className = `avatar ${type}-avatar`;
        if (type === 'me') { wrapper.appendChild(statusDiv); wrapper.appendChild(msgDiv); wrapper.appendChild(avatarDiv); }
        else { wrapper.appendChild(avatarDiv); wrapper.appendChild(msgDiv); wrapper.appendChild(statusDiv); }
        chatContainer.appendChild(wrapper);
        scrollToBottom();
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 500) { h *= 500 / w; w = 500; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const compressed = canvas.toDataURL('image/jpeg', 0.7);
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                renderMessage(compressed, 'me', time, true, Date.now());
                saveToLocal(compressed, 'me', time, true, Date.now());
            };
        };
        reader.readAsDataURL(file);
    }

    function saveToLocal(content, type, time, isImage, id) {
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        data.push({content, type, time, isImage, id});
        if (data.length > 50) data.shift();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function deleteMessage(id) {
        if (confirm("要回收這條訊息嗎？")) {
            const el = document.getElementById(`msg-${id}`);
            if (el) el.remove();
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data.filter(m => m.id !== id)));
        }
    }

    function addEmoji(emoji) { msgInput.value += emoji; msgInput.focus(); }
    function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>

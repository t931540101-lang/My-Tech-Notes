<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Security 差勤管理後台</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --hq-primary: #00e5ff;
            --hq-bg: #0f172a;
            --hq-card: #1e293b;
            --hq-border: #334155;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background-color: var(--hq-bg); color: #f8fafc; margin: 0; padding: 20px; }

        .header-panel { display: flex; justify-content: space-between; align-items: center; background: var(--hq-card); padding: 20px 30px; border-radius: 12px; border: 1.5px solid var(--hq-border); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .title-area h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 2px; color: white; }
        .title-area p { margin: 5px 0 0 0; color: var(--hq-primary); font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        .btn-export { background: var(--hq-primary); color: #0f172a; padding: 12px 25px; border: none; border-radius: 8px; font-size: 16px; font-weight: 900; letter-spacing: 2px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2); }
        .btn-export:hover { background: white; box-shadow: 0 4px 20px rgba(0, 229, 255, 0.4); transform: translateY(-2px); }
        .btn-export:active { transform: translateY(0); }

        .table-container { background: var(--hq-card); border-radius: 12px; border: 1.5px solid var(--hq-border); overflow-x: auto; padding: 1px; }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th, td { padding: 15px 10px; border-bottom: 1px solid var(--hq-border); font-size: 15px; }
        th { background: rgba(0,0,0,0.3); color: var(--hq-primary); font-weight: 900; letter-spacing: 1px; position: sticky; top: 0; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; color: white; display: inline-block; }
        .badge-in { background: var(--success); }
        .badge-out { background: #64748b; }
        .badge-late { background: var(--warning); color: #000; box-shadow: 0 0 8px rgba(245, 158, 11, 0.4); }
        .badge-normal { background: transparent; color: var(--success); border: 1px solid var(--success); }

        /* 備註輸入框 */
        .reason-input { width: 100%; max-width: 250px; background: #0f172a; border: 1px solid var(--hq-border); color: white; padding: 10px; border-radius: 6px; font-size: 14px; outline: none; transition: 0.2s; }
        .reason-input:focus { border-color: var(--warning); box-shadow: 0 0 5px rgba(245, 158, 11, 0.3); }
        .reason-input::placeholder { color: #475569; }

        .empty-state { padding: 50px; text-align: center; color: #64748b; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="title-area">
            <h1>台灣精銳</h1>
            <p>M-Security 差勤管理後台</p>
        </div>
        <button class="btn-export" onclick="exportToExcel()">📊 一鍵匯出 EXCEL</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>班別</th>
                    <th>姓名</th>
                    <th>工號</th>
                    <th>打卡類型</th>
                    <th>打卡時間</th>
                    <th>狀態</th>
                    <th style="width: 25%;">後台備註 (事假/遲到原因)</th>
                </tr>
            </thead>
            <tbody id="logBody">
                <tr>
                    <td colspan="8" class="empty-state">正在連線至雲端差勤庫...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // === 1. Firebase 初始化 ===
        const firebaseConfig = { apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", projectId: "factor-security-d1965" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let attendanceData = []; // 用於暫存給匯出功能使用

        // === 2. 監聽差勤資料庫 ===
        db.ref('attendance_logs').on('value', (snapshot) => {
            const tbody = document.getElementById('logBody');
            tbody.innerHTML = '';
            attendanceData = [];

            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">目前尚無任何打卡紀錄</td></tr>';
                return;
            }

            // 將物件轉為陣列並按時間反向排序 (最新的在最上面)
            snapshot.forEach(child => {
                attendanceData.push({ key: child.key, ...child.val() });
            });
            attendanceData.sort((a, b) => b.timestamp - a.timestamp);

            // 渲染表格
            attendanceData.forEach(log => {
                const tr = document.createElement('tr');
                
                const typeBadge = log.type === 'IN' ? '<span class="badge badge-in">上班</span>' : '<span class="badge badge-out">下班</span>';
                const statusBadge = log.isLate ? '<span class="badge badge-late">⚠️ 遲到</span>' : '<span class="badge badge-normal">🟢 正常</span>';
                const reasonText = log.reason || '';

                tr.innerHTML = `
                    <td style="font-family: monospace; font-weight: bold;">${log.date}</td>
                    <td style="color: #94a3b8; font-weight: bold;">${log.shift}</td>
                    <td style="font-weight: 900; color: white;">${log.name}</td>
                    <td style="font-family: monospace; color: var(--hq-primary);">${log.empId}</td>
                    <td>${typeBadge}</td>
                    <td style="font-family: monospace; font-size: 18px; font-weight: bold;">${log.time}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <input type="text" class="reason-input" 
                            placeholder="${log.isLate ? '請填寫遲到原因...' : '點此新增備註...'}" 
                            value="${reasonText}" 
                            onchange="updateReason('${log.key}', this.value)">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        // === 3. 更新備註 (自動存入 Firebase) ===
        function updateReason(key, newReason) {
            db.ref('attendance_logs/' + key).update({ reason: newReason }).then(() => {
                console.log("備註已更新:", newReason);
                // 視覺提示可以在這裡加，但因為 Firebase on('value') 會自動重繪，所以其實不用做額外動作
            });
        }

        // === 4. 📊 匯出為 Excel (CSV) ===
        function exportToExcel() {
            if (attendanceData.length === 0) return alert("目前沒有資料可以匯出！");

            let csv = "\ufeff"; // UTF-8 BOM，確保中文不亂碼
            
            // 表頭
            csv += "日期,班別,姓名,工號,打卡類型,打卡時間,狀態,後台備註\n";

            // 內容
            attendanceData.forEach(log => {
                const typeStr = log.type === 'IN' ? '上班' : '下班';
                const statusStr = log.isLate ? '遲到' : '正常';
                const reasonStr = log.reason ? `"${log.reason}"` : ""; // 用雙引號包起來防逗號衝突

                let row = [
                    log.date,
                    log.shift,
                    log.name,
                    log.empId,
                    typeStr,
                    log.time,
                    statusStr,
                    reasonStr
                ];
                csv += row.join(",") + "\n";
            });

            // 下載動作
            const now = new Date();
            const filename = `台灣精銳_打卡紀錄表_${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}.csv`;
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>

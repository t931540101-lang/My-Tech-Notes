<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SECURITY HQ | 出勤查詢後台</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --hq-cyan: #00e5ff;
            --hq-bg: #0f172a;
            --hq-card: #1e293b;
            --hq-border: #334155;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, "Microsoft JhengHei", sans-serif; 
            background-color: var(--hq-bg); color: #f8fafc; margin: 0; padding: 20px; 
        }

        /* 頂部戰略條 */
        .header-panel { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--hq-card); padding: 20px; border-radius: 12px; 
            border: 1.5px solid var(--hq-border); margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .title-group h1 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 2px; }
        .title-group p { margin: 5px 0 0 0; color: var(--hq-cyan); font-size: 13px; font-weight: bold; }

        .btn-export { 
            background: var(--hq-cyan); color: #0f172a; padding: 12px 25px; 
            border: none; border-radius: 8px; font-weight: 900; cursor: pointer; 
            transition: 0.2s; box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }
        .btn-export:hover { background: white; transform: scale(1.05); }

        /* 戰情表格 */
        .table-container { 
            background: var(--hq-card); border-radius: 12px; 
            border: 1.5px solid var(--hq-border); overflow-x: auto; 
        }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 15px; border-bottom: 1px solid var(--hq-border); text-align: center; }
        th { background: rgba(0,0,0,0.3); color: var(--hq-cyan); font-weight: 900; font-size: 14px; }
        
        /* 狀態標籤 */
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-in { background: var(--success); color: white; }
        .badge-out { background: #64748b; color: white; }
        .badge-late { background: var(--warning); color: black; box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
        .badge-ok { border: 1px solid var(--success); color: var(--success); }

        /* 編輯備註區 */
        .reason-input { 
            width: 100%; background: #0f172a; border: 1px solid var(--hq-border); 
            color: white; padding: 8px; border-radius: 4px; outline: none; 
            transition: 0.3s;
        }
        .reason-input:focus { border-color: var(--warning); background: #1e293b; }

        .loading-msg { padding: 50px; text-align: center; color: var(--hq-cyan); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-panel">
        <div class="title-group">
            <h1>台灣精銳 HQ</h1>
            <p>M-SECURITY 出勤查詢後台</p>
        </div>
        <button class="btn-export" onclick="exportAttendance()">📊 一鍵匯出 EXCEL 報表</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>班別</th>
                    <th>姓名</th>
                    <th>工號</th>
                    <th>打卡</th>
                    <th>時間</th>
                    <th>狀態</th>
                    <th style="width: 250px;">後台備註 (遲到/事假原因)</th>
                </tr>
            </thead>
            <tbody id="attendanceBody">
                <tr><td colspan="8" class="loading-msg">📡 正在同步雲端數據中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // === 1. Firebase 完整金鑰 (與前線同步) ===
        const firebaseConfig = {
            // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAOGNz_ac-9DsJH-xi8-viSXIPSjAZ7mDs",
  authDomain: "black-obsidian-project.firebaseapp.com",
  projectId: "black-obsidian-project",
  storageBucket: "black-obsidian-project.firebasestorage.app",
  messagingSenderId: "438491554810",
  appId: "1:438491554810:web:cdc782c7d4df031f8d3a43"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allLogs = [];

        // === 2. 實時數據監聽 ===
        db.ref('attendance_logs').on('value', (snapshot) => {
            const tbody = document.getElementById('attendanceBody');
            tbody.innerHTML = '';
            allLogs = [];

            if (!snapshot.exists()) {
                tbody.innerHTML = '<tr><td colspan="8" style="padding:40px; color:#555;">目前尚無打卡紀錄</td></tr>';
                return;
            }

            snapshot.forEach(child => {
                allLogs.push({ key: child.key, ...child.val() });
            });
            // 最新的排在最上面
            allLogs.sort((a, b) => b.timestamp - a.timestamp);

            allLogs.forEach(log => {
                const tr = document.createElement('tr');
                const typeBadge = log.type === 'IN' ? '<span class="badge badge-in">上班</span>' : '<span class="badge badge-out">下班</span>';
                const statusBadge = log.isLate ? '<span class="badge badge-late">⚠️ 遲到</span>' : '<span class="badge badge-ok">🟢 正常</span>';
                
                tr.innerHTML = `
                    <td style="font-family:monospace;">${log.date}</td>
                    <td style="color:var(--hq-cyan); font-weight:bold;">${log.shift}</td>
                    <td style="font-weight:bold;">${log.name}</td>
                    <td style="font-family:monospace;">${log.empId}</td>
                    <td>${typeBadge}</td>
                    <td style="font-size:16px; font-weight:bold;">${log.time}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <input type="text" class="reason-input" 
                               value="${log.reason || ''}" 
                               placeholder="輸入原因..."
                               onchange="updateNote('${log.key}', this.value)">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        // === 3. 備註即時更新函數 ===
        function updateNote(key, val) {
            db.ref('attendance_logs/' + key).update({ reason: val }).then(() => {
                console.log("備註已存檔");
            });
        }

        // === 4. 📊 報表匯出引擎 ===
        function exportAttendance() {
            if (allLogs.length === 0) return alert("無資料可匯出");

            let csv = "\ufeff日期,班別,姓名,工號,類型,時間,狀態,後台備註\n";
            allLogs.forEach(l => {
                const type = l.type === 'IN' ? '上班' : '下班';
                const status = l.isLate ? '遲到' : '正常';
                csv += `${l.date},${l.shift},${l.name},${l.empId},${type},${l.time},${status},"${l.reason || ''}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `台灣精銳_差勤報表_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>

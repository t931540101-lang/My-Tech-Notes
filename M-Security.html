<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣精銳 M-Security - 系統授權登入</title>
    <style>
        /* 💡 架構師專屬控制台：直接修改這裡的數值！ */
        :root {
            /* 1. 台灣精銳 (主標題) 設定 */
            --main-title-color: #000000;       /* 顏色：純黑 (#000000) 或企業藍 (#1e3a8a) */
            --main-title-weight: 900;          /* 粗細：可填 400(正常) 到 900(極粗) */
            --main-title-spacing: 4px;         /* 字距：文字之間的距離 */
            --main-title-bottom-margin: 8px;   /* 位置：與下方副標題的距離 */

            /* 2. M-Security 綜合查詢系統 (副標題) 設定 */
            --sub-title-color: #333333;        /* 顏色：深灰 (#333333) */
            --sub-title-weight: 600;           /* 粗細：600 為微粗體 */
            --sub-title-spacing: 1px;          /* 字距 */

            /* 3. 系統授權登入 (卡片標題) 設定 */
            --card-title-color: #195bba;       /* 顏色：經典藍 */
            --card-title-weight: 800;          /* 粗細：800 */
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #d2d6dc; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 8vh; 
        }
        
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 420px;
            margin-bottom: 30px;
            gap: 15px; 
        }
        
        .company-logo {
            width: 60px;
            height: 60px;
            border-radius: 6px;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            text-align: left; 
        }

        /* 這裡套用上方控制台的變數 */
        .main-title {
            font-size: 34px;
            font-weight: var(--main-title-weight); 
            color: var(--main-title-color); 
            letter-spacing: var(--main-title-spacing);
            margin: 0 0 var(--main-title-bottom-margin) 0;
        }

        .sub-title {
            font-size: 18px;
            font-weight: var(--sub-title-weight); 
            color: var(--sub-title-color); 
            letter-spacing: var(--sub-title-spacing);
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            width: 90%;
            max-width: 420px;
            padding: 35px 24px;
            border-radius: 12px;
            border: 2px solid #547bba;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .card-title {
            color: var(--card-title-color);
            font-size: 22px;
            font-weight: var(--card-title-weight);
            margin-bottom: 25px;
        }

        .input-group { margin-bottom: 18px; }
        .input-group input {
            width: 100%;
            padding: 15px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            color: #1e293b;
            outline: none;
            -webkit-appearance: none;
        }
        .input-group input::placeholder { color: #94a3b8; }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .login-btn {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background-color: #3b82f6; 
            color: white;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
        }
        .login-btn:active { background-color: #2563eb; transform: translateY(1px); }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="logo.png" alt="Logo" class="company-logo" onerror="this.style.display='none'">
        <div class="text-group">
            <h1 class="main-title">台灣精銳</h1>
            <h2 class="sub-title">M-Security 綜合查詢系統</h2>
        </div>
    </div>

    <div class="login-card">
        <div class="card-title">系統授權登入</div>
        <div class="input-group">
            <input type="text" id="officerName" placeholder="值勤人員姓名">
        </div>
        <div class="input-group">
            <input type="password" id="authCode" placeholder="授權碼" inputmode="numeric">
        </div>
        <button class="login-btn" onclick="handleLogin()">授權登入</button>
    </div>

    <script>
        window.onload = function() {
            const savedName = localStorage.getItem('m_security_officer_name');
            if (savedName) document.getElementById('officerName').value = savedName;
        };

        function handleLogin() {
            const nameInput = document.getElementById('officerName').value.trim();
            const codeInput = document.getElementById('authCode').value.trim();
            if (!nameInput || !codeInput) { alert('請完整輸入姓名與授權碼'); return; }
            localStorage.setItem('m_security_officer_name', nameInput);
            alert('授權成功！歡迎值勤，' + nameInput);
        }
    </script>
</body>
</html>

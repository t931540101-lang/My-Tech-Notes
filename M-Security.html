<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣精銳 M-Security - 系統授權登入</title>
    <style>
        /* 💡 旗艦版控制台：全方位精細操控 */
        :root {
            --main-title-color: #1e3a8a;
            --main-title-weight: 900;
            --main-title-size: 38px;
            --main-title-spacing: 5px;
            --main-title-bottom-margin: 10px;
            --sub-title-color: #333333;
            --sub-title-weight: 600;
            --sub-title-size: 20px;
            --sub-title-spacing: 1px;
            --card-width: calc(100% - 40px);
            --card-max-width: 440px;
            --card-border-color: #547bba;
            --card-content-max-width: 300px;
            --card-title-color: #1d4ed8;
            --card-title-weight: 800;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; overflow: hidden; background-color: #d2d6dc; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 12vh; 
        }

        .header-global {
            text-align: center;
            width: 90%;
            max-width: calc(var(--card-max-width) * 0.9);
            margin-bottom: 4vh;
            text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }

        .main-title-text {
            font-size: var(--main-title-size);
            font-weight: var(--main-title-weight); 
            color: var(--main-title-color); 
            letter-spacing: var(--main-title-spacing);
            margin: 0 0 var(--main-title-bottom-margin) 0;
        }

        .sub-title-text {
            font-size: var(--sub-title-size);
            font-weight: var(--sub-title-weight); 
            color: var(--sub-title-color); 
            letter-spacing: var(--sub-title-spacing);
            margin: 0;
        }

        .login-card-container {
            background: #ffffff;
            width: var(--card-width);
            max-width: var(--card-max-width);
            padding: 40px 24px;
            border-radius: 12px;
            border: 2px solid var(--card-border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .card-content-wrapper {
            width: 100%;
            max-width: var(--card-content-max-width);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-title-text {
            color: var(--card-title-color);
            font-size: 22px;
            font-weight: var(--card-title-weight);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group-container { 
            width: 100%;
            margin-bottom: 20px; 
            position: relative; 
            display: flex;
            align-items: center;
        }
        
        .input-group-container input {
            width: 100%;
            padding: 16px 12px;
            padding-right: 40px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            color: #1e293b;
            outline: none;
            -webkit-appearance: none;
            transition: all 0.2s ease;
        }
        
        .input-group-container input::placeholder { color: #b2bec3; font-weight: 500;}
        .input-group-container input:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); 
        }
        
        .input-clear-btn {
            position: absolute;
            right: 12px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background-color: #dfe6e9;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }
        
        .input-group-container input:not(:placeholder-shown) + .input-clear-btn {
            visibility: visible;
            opacity: 1;
        }
        
        .input-clear-btn:hover { background-color: #b2bec3; }

        .login-btn-global {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background-color: #3b82f6; 
            color: white;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }
        
        .login-btn-global:active { background-color: #2563eb; transform: translateY(1px); }
    </style>
</head>
<body>

    <div class="header-global">
        <h1 class="main-title-text">台灣精銳</h1>
        <h2 class="sub-title-text">M-Security 綜合查詢系統</h2>
    </div>

    <div class="login-card-container">
        <div class="card-content-wrapper">
            <div class="card-title-text">系統授權登入</div>
            
            <div class="input-group-container">
                <input type="text" id="officerName" placeholder="值勤人員姓名">
                <span class="input-clear-btn" onclick="clearInput('officerName')">×</span>
            </div>
            <div class="input-group-container">
                <input type="password" id="authCode" placeholder="授權碼" inputmode="text">
                <span class="input-clear-btn" onclick="clearInput('authCode')">×</span>
            </div>
            
            <button class="login-btn-global" onclick="handleLogin()">授權登入</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            // 讀取上次登入成功的紀錄（有的話自動帶入姓名）
            const savedName = localStorage.getItem('m_security_officer_name');
            if (savedName) {
                document.getElementById('officerName').value = savedName;
            }
        };
        
        function clearInput(inputId) {
            const inputInput = document.getElementById(inputId);
            inputInput.value = '';
            inputInput.focus();
        }

        function handleLogin() {
            const nameInput = document.getElementById('officerName').value.trim();
            const codeInput = document.getElementById('authCode').value.trim();
            
            if (!nameInput || !codeInput) { 
                alert('⚠️ 請完整輸入姓名與授權碼！'); 
                return; 
            }
            
            // 🚀 真實門鎖驗證邏輯：比對帳號密碼
            if (nameInput === '盧家慶' && codeInput === 'D01762') {
                // 登入成功：記憶姓名
                localStorage.setItem('m_security_officer_name', nameInput);
                
                alert(`授權成功！歡迎值勤，${nameInput}。`);
                
                // 💡 登入成功後跳轉到主系統 (請確保你的主系統檔名是 main.html，如果不同請修改這裡！)
                window.location.href = 'main.html'; 
                
            } else {
                // 登入失敗：擋在門外並清空密碼
                alert('❌ 系統拒絕存取：帳號或密碼錯誤！');
                document.getElementById('authCode').value = '';
            }
        }
    </script>
</body>
</html>

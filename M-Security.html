<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-Security 旗艦版 | 台灣精銳</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-color: #eaf1f9;
            --tab-bg-dark: #63768b;
            --tab-bg-active: #4a5c70;
            --tab-highlight: #00e5ff;
            --primary-blue: #2c7ce6;
            --text-dark: #1e293b;
            --text-blue: #1c529b;
            --danger: #e74c3c;
            --success: #10b981;
            --vip-gold: #f1c40f;
            --vip-purple: #8e44ad;
        }

        * { box-sizing: border-box; }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; background-color: #d2d6dc; margin: 0; padding: 0; height: 100vh; overflow: hidden; }

        /* === 🚪 登入大門 === */
        #login-gate { height: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 10vh; }
        .login-card { background: #ffffff; width: calc(100% - 40px); max-width: 400px; padding: 35px 24px; border-radius: 12px; border: 2px solid #547bba; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }

        /* === 🛡️ 主系統 === */
        #main-system { display: none; height: 100%; flex-direction: column; background-color: var(--bg-color); }
        .tabs-header { display: flex; background-color: var(--tab-bg-dark); height: 50px; flex-shrink: 0; }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #ffffff; font-size: 15px; font-weight: bold; cursor: pointer; }
        .tab-item.active { background-color: var(--tab-bg-active); border-bottom: 3px solid var(--tab-highlight); }
        .tab-content { display: none; padding: 15px; flex: 1; overflow-y: auto; }
        .tab-content.active { display: block; }

        /* 卡片與按鈕元件 */
        .card { background: #fff; border: 2px solid var(--primary-blue); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .btn-full { width: 100%; padding: 15px; background: var(--primary-blue); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-bottom: 12px; box-shadow: 0 3px 0 #1b56a3; }
        .btn-full:active { transform: translateY(2px); box-shadow: none; }
        
        /* 輸入框樣式 */
        input, textarea { width: 100%; padding: 12px; margin: 5px 0 12px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }

        /* 訪客清單與交接卡片 */
        .log-item { background: #fff; border-left: 5px solid var(--primary-blue); padding: 12px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .duty-card { background: white; border-left: 8px solid var(--text-dark); border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .duty-card.urgent { border-left-color: var(--danger); }
        .duty-card.confirmed { background: #ecfdf5; border-left-color: var(--success); opacity: 0.9; }

        /* 📸 掃描器 */
        .scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #reader { width: 90%; max-width: 400px; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 36px; font-weight: 900; color: #1e3a8a; letter-spacing: 4px; margin: 0;">台灣精銳</h1>
            <h2 style="font-size: 18px; color: #333;">M-Security 綜合查詢系統</h2>
        </div>
        <div class="login-card">
            <h3 style="color: #1d4ed8; margin-bottom: 20px;">系統授權登入</h3>
            <input type="text" id="officerName" placeholder="值勤人員姓名">
            <input type="password" id="authCode" placeholder="授權碼">
            <button class="btn-full" onclick="handleLogin()">授權登入</button>
        </div>
    </div>

    <div id="main-system">
        <div class="tabs-header">
            <div class="tab-item active" onclick="switchTab('tab-general', this)">一般</div>
            <div class="tab-item" onclick="switchTab('tab-advanced', this)">進階</div>
            <div class="tab-item" onclick="switchTab('tab-apps', this)">應用</div>
            <div class="tab-item" onclick="switchTab('tab-channels', this)">頻道</div>
            <div class="tab-item" onclick="switchTab('tab-settings', this)">設定</div>
        </div>

        <div id="tab-general" class="tab-content active">
            <div class="card">
                <div style="font-size: 13px; color: #666; font-weight: bold;">車牌 / 工號</div>
                <input type="text" id="queryInput" style="border:none; font-size:26px; font-weight:900; padding:5px 0;" placeholder="請輸入...">
            </div>
            <button class="btn-full" onclick="executeSearch()">查詢</button>
            <button class="btn-full" onclick="startScanner()">條碼掃描</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-full" style="background:#63768b;" onclick="document.getElementById('queryInput').value=''">清除</button>
                <button class="btn-full" style="background:#63768b;">資料同步</button>
            </div>
            <div class="card" id="resultCard">
                <div id="res-title" style="text-align:center; font-weight:bold; color:var(--primary-blue); margin-bottom:10px;">身份確認：等待查詢</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><b>姓名：</b><span id="res-name">---</span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><b>單位：</b><span id="res-unit">---</span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><b>工號：</b><span id="res-id">---</span></div>
                <div style="display:flex; justify-content:space-between;"><b>車牌：</b><span id="res-plate">---</span></div>
            </div>
        </div>

        <div id="tab-advanced" class="tab-content">
            <div class="card" style="border-color:var(--vip-purple);">
                <h3 style="text-align:center; color:var(--vip-purple); margin-top:0;">🛡️ VIP 查驗系統</h3>
                <input type="text" id="vipQueryInput" style="text-align:center; font-weight:bold;" placeholder="輸入 VIP 代號">
                <button class="btn-full" style="background:var(--vip-purple);" onclick="searchVIP()">機密檢索</button>
                <div id="vipResultArea" style="display:none;" class="ink-container" onclick="revealInk()">
                    <div style="text-align:center; font-size:12px; color:#b7950b; margin-bottom:10px;">⚠️ 點擊區塊解碼 (3秒後重鎖)</div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><b>姓名：</b><span id="vip-name" class="blur-text">---</span></div>
                    <div style="display:flex; justify-content:space-between;"><b>車牌：</b><span id="vip-plate" class="blur-text">---</span></div>
                </div>
            </div>
        </div>

        <div id="tab-apps" class="tab-content">
            <div class="card">
                <h3 style="text-align:center; color:var(--primary-blue); margin-top:0;">訪客登記入廠</h3>
                <label style="font-size:12px; font-weight:bold;">訪客姓名</label><input type="text" id="vName">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:12px; font-weight:bold;">人數</label><input type="number" id="vCount" value="1"></div>
                    <div><label style="font-size:12px; font-weight:bold;">電話</label><input type="tel" id="vPhone"></div>
                </div>
                <label style="font-size:12px; font-weight:bold;">公司行號</label><input type="text" id="vComp">
                <label style="font-size:12px; font-weight:bold;">受訪人員</label><input type="text" id="vTarget">
                <label style="font-size:12px; font-weight:bold;">事由</label><textarea id="vReason" rows="1"></textarea>
                <button class="btn-full" onclick="submitLog()">送出登記並同步雲端</button>
            </div>
            <div id="logList"></div>
        </div>

        <div id="tab-channels" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0; font-weight:900;">勤務交接簿</h2>
                <button onclick="addHandoverEntry()" style="background:#1e293b; color:white; padding:10px 15px; border-radius:8px; font-weight:bold;">+ 新增交接</button>
            </div>
            <div id="handoverList"></div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="card" style="text-align:center; padding:30px 15px;">
                <div style="font-size:50px;">👮‍♂️</div>
                <div id="setting-officer-name" style="font-size:22px; font-weight:900; margin:10px 0;">盧家慶</div>
                <div style="color:var(--success); font-weight:bold; margin-bottom:20px;">🟢 當前連線值勤中</div>
                <button class="btn-full" style="background:#f1f5f9; color:#1e293b; border:1px solid #ccc;" onclick="systemLogout()">🚪 登出系統</button>
                <button class="btn-full" style="background:#fef2f2; color:var(--danger); border:1px solid #fecaca;" onclick="systemClearCache()">🗑️ 清除快取重置</button>
            </div>
        </div>
    </div>

    <div class="scanner-modal" id="scannerModal">
        <div id="reader"></div>
        <button onclick="closeScanner()" style="margin-top:20px; padding:15px 30px; background:var(--danger); color:white; border:none; border-radius:8px; font-weight:bold;">關閉相機</button>
    </div>

    <script>
        // 1. 初始化
        const firebaseConfig = { apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI907S1YdCWor48", databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", projectId: "factor-security-d1965" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentOfficerName = localStorage.getItem('m_security_officer_name');

        function handleLogin() {
            const name = document.getElementById('officerName').value.trim();
            const code = document.getElementById('authCode').value.trim();
            if (name === '盧家慶' && code === 'D01762') {
                localStorage.setItem('m_security_officer_name', name);
                currentOfficerName = name;
                showSystem();
            } else { alert('❌ 授權錯誤！'); }
        }

        function showSystem() {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('main-system').style.display = 'flex';
            document.getElementById('setting-officer-name').innerText = currentOfficerName;
            loadData();
        }

        if (currentOfficerName) showSystem();

        // 2. 切換邏輯
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // 3. 一般查詢 (對接 HQ)
        async function executeSearch() {
            const val = document.getElementById('queryInput').value.trim().toUpperCase();
            if (!val) return;
            db.ref('search_logs').push({ time: new Date().toLocaleTimeString(), user: currentOfficerName, query: val, timestamp: firebase.database.ServerValue.TIMESTAMP });
            const snap = await db.ref('employee_list').once('value');
            let found = null;
            snap.forEach(c => { 
                const d = c.val(); 
                if (d.plate === val || d.id === val || d.name === val) found = d; 
            });
            if (found) {
                document.getElementById('res-title').innerText = "身份確認：台灣精銳員工";
                document.getElementById('res-name').innerText = found.name;
                document.getElementById('res-unit').innerText = found.reason || '---';
                document.getElementById('res-id').innerText = found.id || '---';
                document.getElementById('res-plate').innerText = found.plate || '---';
            } else { alert('查無此人'); }
        }

        // 4. 訪客登記
        function submitLog() {
            const vName = document.getElementById('vName').value.trim();
            if(!vName) return alert("請輸入姓名！");
            const now = new Date();
            const logData = {
                name: vName, company: document.getElementById('vComp').value,
                count: document.getElementById('vCount').value, phone: document.getElementById('vPhone').value,
                target: document.getElementById('vTarget').value, reason: document.getElementById('vReason').value,
                timeIn: now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0'),
                recorder: currentOfficerName, leaveTime: "", timestamp: Date.now()
            };
            db.ref('visitor_logs').push(logData).then(() => {
                alert("登記成功！");
                ['vName','vComp','vPhone','vReason','vTarget'].forEach(id => document.getElementById(id).value="");
            });
        }

        // 5. 勤務交接
        function addHandoverEntry() {
            const note = prompt("請輸入交接事項：");
            if (!note) return;
            const urgent = confirm("標註為重要事項嗎？");
            const now = new Date();
            db.ref('reactLogs').push({
                time: (now.getMonth()+1)+"/"+now.getDate()+" "+now.getHours()+":"+now.getMinutes().toString().padStart(2,'0'),
                note: note, urgent: urgent, confirmedBy: null, timestamp: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function confirmHandover(id) {
            if(confirm(`以「${currentOfficerName}」身分簽署確認？`)) {
                db.ref(`reactLogs/${id}`).update({ confirmedBy: currentOfficerName });
            }
        }

        // 6. 監聽與讀取
        function loadData() {
            // 訪客監聽
            db.ref('visitor_logs').limitToLast(10).on('value', s => {
                const list = document.getElementById('logList'); list.innerHTML = '<h3 style="text-align:center; color:#666; font-size:14px;">實時登記清單</h3>';
                const data = s.val(); if(data) {
                    Object.keys(data).reverse().forEach(k => {
                        const d = data[k];
                        list.innerHTML += `<div class="log-item"><b>${d.name} (${d.count}人)</b><br>公司：${d.company}<br>入廠時間：${d.timeIn}</div>`;
                    });
                }
            });
            // 交接監聽
            db.ref('reactLogs').limitToLast(10).on('value', s => {
                const list = document.getElementById('handoverList'); list.innerHTML = '';
                const data = s.val(); if(data) {
                    Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp).forEach(k => {
                        const d = data[k];
                        list.innerHTML += `<div class="duty-card ${d.urgent?'urgent':''} ${d.confirmedBy?'confirmed':''}">
                            <div style="font-size:12px; background:#334155; color:white; display:inline-block; padding:2px 6px; border-radius:4px; margin-bottom:10px;">${d.time}</div>
                            ${d.urgent?'<span style="color:red; font-weight:bold; margin-left:10px;">⚠️重要</span>':''}
                            ${d.confirmedBy?`<span style="color:green; font-weight:bold; margin-left:10px;">✓ 已閱：${d.confirmedBy}</span>`:''}
                            <div style="font-size:18px; font-weight:bold;">${d.note}</div>
                            ${!d.confirmedBy?`<button onclick="confirmHandover('${k}')" style="width:100%; margin-top:10px; border:1px dashed #ccc; padding:8px;">🖱️ 點擊簽署確認</button>`:''}
                        </div>`;
                    });
                }
            });
        }

        // 其餘邏輯維持 (VIP, 登出, 掃描器)
        async function searchVIP() {
            const val = document.getElementById('vipQueryInput').value.trim().toUpperCase();
            const snap = await db.ref('vip_list').once('value');
            let found = null;
            snap.forEach(c => { if(c.val().plate === val || c.val().name === val) found = c.val(); });
            if (found) {
                document.getElementById('vip-name').innerText = found.name;
                document.getElementById('vip-plate').innerText = found.plate;
                document.getElementById('vipResultArea').style.display = 'block';
            }
        }
        function revealInk() {
            const el = document.querySelectorAll('.blur-text');
            el.forEach(e => e.classList.add('revealed'));
            setTimeout(() => el.forEach(e => e.classList.remove('revealed')), 3000);
        }
        function systemLogout() { localStorage.removeItem('m_security_officer_name'); window.location.reload(); }
        function systemClearCache() { localStorage.clear(); window.location.reload(); }
        let html5QrCode;
        function startScanner() {
            document.getElementById('scannerModal').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('queryInput').value = txt;
                closeScanner(); executeSearch();
            });
        }
        function closeScanner() { document.getElementById('scannerModal').style.display = 'none'; if(html5QrCode) html5QrCode.stop(); }
    </script>
</body>
</html>

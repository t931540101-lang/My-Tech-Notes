<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣精銳 M-Security - 系統授權登入</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #d2d6dc; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 8vh; 
        }
        
        /* 標題區塊佈局設定 (位置：群組靠左、整體居中) */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 420px;
            margin-bottom: 30px;
            gap: 15px; /* Logo 與文字的間距 */
        }
        
        .company-logo {
            width: 60px;
            height: 60px;
            border-radius: 6px;
        }

        .text-group {
            display: flex;
            flex-direction: column;
            text-align: left; /* 文字靠左對齊 */
        }

        /* 台灣精銳 標題設定 */
        .main-title {
            font-size: 34px;
            font-weight: 800; /* 粗細：特粗 (800) */
            color: #1e3a8a; /* 顏色：企業藍 */
            margin: 0 0 4px 0;
            letter-spacing: 2px;
        }

        /* M-Security 副標題設定 */
        .sub-title {
            font-size: 18px;
            font-weight: 500; /* 粗細：適中 (500) */
            color: #475569; /* 顏色：鐵灰色 */
            margin: 0;
        }

        /* 登入卡片設定 */
        .login-card {
            background: #ffffff;
            width: 90%;
            max-width: 420px;
            padding: 35px 24px;
            border-radius: 12px;
            border: 2px solid #547bba;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .card-title {
            color: #1d4ed8;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
        }
        .input-group { margin-bottom: 18px; }
        .input-group input {
            width: 100%;
            padding: 15px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            color: #1e293b;
            outline: none;
            -webkit-appearance: none;
        }
        .input-group input::placeholder { color: #94a3b8; }
        .input-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .login-btn {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background-color: #3b82f6; 
            color: white;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
        }
        .login-btn:active { background-color: #2563eb; transform: translateY(1px); }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="logo.png" alt="Logo" class="company-logo" onerror="this.style.display='none'">
        <div class="text-group">
            <h1 class="main-title">台灣精銳</h1>
            <h2 class="sub-title">M-Security 綜合查詢系統</h2>
        </div>
    </div>

    <div class="login-card">
        <div class="card-title">系統授權登入</div>
        <div class="input-group">
            <input type="text" id="officerName" placeholder="值勤人員姓名">
        </div>
        <div class="input-group">
            <input type="password" id="authCode" placeholder="授權碼" inputmode="numeric">
        </div>
        <button class="login-btn" onclick="handleLogin()">授權登入</button>
    </div>

    <script>
        window.onload = function() {
            const savedName = localStorage.getItem('m_security_officer_name');
            if (savedName) document.getElementById('officerName').value = savedName;
        };

        function handleLogin() {
            const nameInput = document.getElementById('officerName').value.trim();
            const codeInput = document.getElementById('authCode').value.trim();
            if (!nameInput || !codeInput) { alert('請完整輸入姓名與授權碼'); return; }
            localStorage.setItem('m_security_officer_name', nameInput);
            alert('授權成功！歡迎值勤，' + nameInput);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX 線上排班系統</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #151820; --border: #252a35; --border2: #1e2330;
    --text: #c8cdd8; --text-dim: #5a6175; --accent: #e8a020;
    --early-bg: #1a2a1a; --early-txt: #5dcc6e; --early-bdr: #2a4a2a;
    --mid-bg: #1a1f2e; --mid-txt: #5b9cf6; --mid-bdr: #243050;
    --night-bg: #221a2e; --night-txt: #b07ef0; --night-bdr: #3a2550;
    --off-bg: #131518; --off-txt: #3a3f50; --today-glow: rgba(232,160,32,0.15);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; margin: 0; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); }
  .btn-group { display: flex; gap: 10px; }
  button { background: var(--border); border: 1px solid var(--border2); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: .2s; }
  button:hover { background: var(--border2); color: white; }
  .table-wrap { padding: 16px; overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 900px; }
  th, td { border: 1px solid var(--border2); padding: 8px; text-align: center; }
  .chip { width: 38px; height: 32px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-family: 'Rajdhani'; font-weight: 700; }
  .chip-E { background: var(--early-bg); color: var(--early-txt); }
  .chip-M { background: var(--mid-bg); color: var(--mid-txt); }
  .chip-N { background: var(--night-bg); color: var(--night-txt); }
  .chip-O { background: var(--off-bg); color: var(--off-txt); }
  /* Modal 與其他原有樣式保持不變 */
</style>
</head>
<body>

<header>
  <div class="logo">APEX<span> SCHEDULE</span></div>
  <div class="btn-group">
    <button onclick="autoSchedule()">⚙️ 自動排班</button>
    <button onclick="exportCSV()">💾 匯出 CSV</button>
  </div>
  <div class="nav-month">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</header>

<div class="table-wrap">
  <table id="scheduleTable"></table>
</div>

<script>
// 1. 資料與基礎設定
const employees = [
  { id:'e01', name:'王志明', pos:'組長' }, { id:'e02', name:'陳建宏', pos:'隊員' },
  { id:'e03', name:'林淑芬', pos:'隊員' }, { id:'e04', name:'黃俊傑', pos:'隊員' }
];
const SHIFTS = { E: { label:'早', cls:'chip-E' }, M: { label:'中', cls:'chip-M' }, N: { label:'夜', cls:'chip-N' }, O: { label:'休', cls:'chip-O' }};
let schedule = JSON.parse(localStorage.getItem('apexSchedule')) || {};
const today = new Date();
let curYear = today.getFullYear(), curMonth = today.getMonth() + 1;
let pendingCell = null;

// 2. 核心函式定義
function saveToStorage() {
  localStorage.setItem('apexSchedule', JSON.stringify(schedule));
}

function render() {
  const days = new Date(curYear, curMonth, 0).getDate();
  const table = document.getElementById('scheduleTable');
  document.getElementById('monthLabel').textContent = `${curYear} / ${String(curMonth).padStart(2,'0')}`;
  
  // 建立表頭與表格主體 (保持你原本的邏輯)
  let thead = `<thead><tr><th class="emp-col">人員</th>`;
  for (let d = 1; d <= days; d++) thead += `<th>${d}</th>`;
  thead += `<th>統計</th></tr></thead>`;

  let tbody = '<tbody>';
  employees.forEach(emp => {
    let row = `<tr><td class="emp-col">${emp.name}</td>`;
    for (let d = 1; d <= days; d++) {
      const dateStr = `${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const s = schedule[`${emp.id}_${dateStr}`] || 'O';
      row += `<td><div class="chip ${SHIFTS[s].cls}" onclick="openModal('${emp.id}','${emp.name}','${dateStr}')">${SHIFTS[s].label}</div></td>`;
    }
    row += `<td>...</td></tr>`;
    tbody += row;
  });
  table.innerHTML = thead + tbody + '</tbody>';
}

function openModal(empId, empName, dateStr) {
  pendingCell = { empId, dateStr };
  document.getElementById('modalSub').textContent = `${empName}・${dateStr}`;
  document.getElementById('overlay').classList.add('open');
}

function selectShift(type) {
  if (!pendingCell) return;
  schedule[`${pendingCell.empId}_${pendingCell.dateStr}`] = type;
  saveToStorage();
  document.getElementById('overlay').classList.remove('open');
  render();
}

function autoSchedule() {
  const days = new Date(curYear, curMonth, 0).getDate();
  employees.forEach(emp => {
    for (let d = 1; d <= days; d++) {
      const key = `${emp.id}_${curYear}-${String(curMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      schedule[key] = ['E','M','N','O'][(d + parseInt(emp.id.slice(1))) % 4];
    }
  });
  saveToStorage();
  render();
}

function exportCSV() {
  let csv = '員工ID,姓名,日期,班別\n';
  Object.keys(schedule).forEach(k => { csv += `${k.split('_')[0]},${k.split('_')[1]},${schedule[k]}\n`; });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `schedule.csv`;
  link.click();
}

function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  else if (curMonth < 1) { curMonth = 12; curYear--; }
  render();
}

// 3. 最後執行初始化
render();
</script>

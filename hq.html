<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>總部管理端 | OBSIDIAN HQ</title>
    <link rel="icon" href="IMG_0968.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #0f141e; --surface: #1e2632; --primary: #f39c12; /* 後台用橘金色區分權限 */
            --text: #ffffff; --text-muted: #8892b0; --border: #2c3643;
            --danger: #ef5350; --success: #4caf50; --info: #4fc3f7;
        }
        
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text); padding-bottom: 50px; }

        /* --- 登入畫面 --- */
        #login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; background: radial-gradient(circle at center, #1a2332 0%, var(--bg-dark) 80%); }
        .login-box { width: 100%; max-width: 350px; background: var(--surface); padding: 30px 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .login-box h2 { margin-top: 0; color: var(--primary); letter-spacing: 2px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .login-box button { width: 100%; padding: 14px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }

        /* --- 主系統框架 --- */
        #admin-app { display: none; }
        .header { background: var(--surface); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logout-btn { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        
        /* 切換標籤 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); cursor: pointer; font-weight: bold; }
        .tab.active { background: rgba(243, 156, 18, 0.1); color: var(--primary); border-color: var(--primary); }

        /* 表單區域 */
        .form-card { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .form-card h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-row input { flex: 1; min-width: 120px; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text); border-radius: 4px; box-sizing: border-box; }
        .add-btn { width: 100%; padding: 12px; background: var(--success); color: #fff; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* 列表區域 */
        .data-list { display: flex; flex-direction: column; gap: 10px; }
        .data-item { background: var(--surface); padding: 15px; border-radius: 6px; border-left: 4px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .item-black { border-left-color: var(--danger); }
        .item-emp { border-left-color: var(--info); }
        .item-info { flex: 1; }
        .item-name { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .item-detail { font-size: 13px; color: var(--text-muted); }
        .del-btn { background: rgba(239, 83, 80, 0.2); color: var(--danger); border: 1px solid var(--danger); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-box">
        <img src="IMG_0968.png" alt="LOGO" style="width: 60px; margin-bottom: 10px;" onerror="this.style.display='none'">
        <h2>HQ 總部後台</h2>
        <input type="text" id="adminUser" placeholder="最高權限帳號 (HQ)">
        <input type="password" id="adminPass" placeholder="管理密碼 (HQ0905)">
        <button onclick="loginAdmin()">登入管理系統</button>
    </div>
</div>

<div id="admin-app">
    <div class="header">
        <div class="header-title">
            <img src="IMG_0968.png" alt="LOGO" style="width: 24px;" onerror="this.style.display='none'">
            總部戰情管理端
        </div>
        <button class="logout-btn" onclick="logoutAdmin()">登出</button>
    </div>

    <div class="container">
        <div class="tabs">
            <div class="tab active" id="tab-emp" onclick="switchTab('emp')">內部員工名單</div>
            <div class="tab" id="tab-black" onclick="switchTab('black')">警戒黑名單</div>
        </div>

        <div id="sec-emp">
            <div class="form-card">
                <h3 style="color:var(--info);">➕ 新增內部員工</h3>
                <div class="form-row">
                    <input type="text" id="empName" placeholder="姓名">
                    <input type="text" id="empId" placeholder="工號 / 車牌 (選填)">
                </div>
                <div class="form-row">
                    <input type="text" id="empDept" placeholder="所屬單位 / 備註">
                </div>
                <button class="add-btn" style="background:var(--info);" onclick="addData('employee_list')">寫入員工資料庫</button>
            </div>
            <div class="data-list" id="list-emp">載入中...</div>
        </div>

        <div id="sec-black" style="display:none;">
            <div class="form-card" style="border-color:var(--danger);">
                <h3 style="color:var(--danger);">⚠️ 新增警戒對象</h3>
                <div class="form-row">
                    <input type="text" id="blackName" placeholder="姓名">
                    <input type="text" id="blackId" placeholder="身分證 / 車牌 (選填)">
                </div>
                <div class="form-row">
                    <input type="text" id="blackReason" placeholder="違規原因 / 備註">
                </div>
                <button class="add-btn" style="background:var(--danger);" onclick="addData('blacklist_data')">寫入黑名單資料庫</button>
            </div>
            <div class="data-list" id="list-black">載入中...</div>
        </div>
    </div>
</div>

<script>
    // 1. Firebase 雲端資料庫初始化 (同一個資料庫)
    const firebaseConfig = { 
        apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", 
        databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", 
        projectId: "factor-security-d1965", 
        appId: "1:864846943143:web:4cfa18cd20d2f712225c82" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // 2. 登入邏輯 (後台專屬帳密)
    function loginAdmin() {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPass').value;
        // 後台管理員預設帳密 (可自行更改)
        if(u === "HQ" && p === "HQ0905") {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('admin-app').style.display = 'block';
            fetchData(); // 登入成功後開始抓資料
        } else {
            alert("後台權限驗證失敗！");
        }
    }

    function logoutAdmin() {
        document.getElementById('admin-app').style.display = 'none';
        document.getElementById('login-page').style.display = 'flex';
        document.getElementById('adminPass').value = '';
    }

    // 3. 頁籤切換
    function switchTab(type) {
        document.getElementById('tab-emp').classList.remove('active');
        document.getElementById('tab-black').classList.remove('active');
        document.getElementById('sec-emp').style.display = 'none';
        document.getElementById('sec-black').style.display = 'none';

        document.getElementById('tab-' + type).classList.add('active');
        document.getElementById('sec-' + type).style.display = 'block';
    }

    // 4. 新增資料寫入 Firebase
    function addData(collection) {
        let name, id, reason;
        
        if (collection === 'employee_list') {
            name = document.getElementById('empName').value.trim();
            id = document.getElementById('empId').value.trim();
            reason = document.getElementById('empDept').value.trim();
        } else {
            name = document.getElementById('blackName').value.trim();
            id = document.getElementById('blackId').value.trim();
            reason = document.getElementById('blackReason').value.trim();
        }

        if (!name) { alert("姓名為必填欄位！"); return; }

        // 使用 push() 自動產生唯一碼並存入
        db.ref(collection).push({
            name: name,
            id: id || "",
            plate: id || "", // 讓車牌跟工號都能查
            reason: reason || "無備註"
        }).then(() => {
            alert("✅ 資料寫入成功！");
            // 清空輸入框
            document.querySelectorAll('input[type="text"]').forEach(input => input.value = '');
        }).catch(err => {
            alert("❌ 寫入失敗：" + err.message);
        });
    }

    // 5. 刪除資料
    function deleteData(collection, key, name) {
        if(confirm(`⚠️ 確定要從資料庫中刪除「${name}」嗎？刪除後無法復原。`)) {
            db.ref(`${collection}/${key}`).remove()
              .then(() => alert("資料已刪除！"))
              .catch(err => alert("刪除失敗：" + err.message));
        }
    }

    // 6. 即時監聽資料庫變化並渲染列表
    function fetchData() {
        // 監聽員工名單
        db.ref('employee_list').on('value', (snapshot) => {
            const list = document.getElementById('list-emp');
            list.innerHTML = '';
            let count = 0;
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                count++;
                list.innerHTML += `
                    <div class="data-item item-emp">
                        <div class="item-info">
                            <div class="item-name">${data.name}</div>
                            <div class="item-detail">工號/車牌: ${data.id || '無'} | 單位: ${data.reason}</div>
                        </div>
                        <button class="del-btn" onclick="deleteData('employee_list', '${key}', '${data.name}')">刪除</button>
                    </div>
                `;
            });
            if(count === 0) list.innerHTML = '<div style="color:gray; text-align:center;">目前無員工資料</div>';
        });

        // 監聽黑名單
        db.ref('blacklist_data').on('value', (snapshot) => {
            const list = document.getElementById('list-black');
            list.innerHTML = '';
            let count = 0;
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                count++;
                list.innerHTML += `
                    <div class="data-item item-black">
                        <div class="item-info">
                            <div class="item-name" style="color:var(--danger);">${data.name}</div>
                            <div class="item-detail">身分證/車牌: ${data.id || '無'} | 違規: ${data.reason}</div>
                        </div>
                        <button class="del-btn" onclick="deleteData('blacklist_data', '${key}', '${data.name}')">刪除</button>
                    </div>
                `;
            });
            if(count === 0) list.innerHTML = '<div style="color:gray; text-align:center;">目前無黑名單資料</div>';
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>戰情中心 V9.0 | 黑曜旗艦版</title>
    <link rel="icon" href="IMG_0968.png">
    <link rel="apple-touch-icon" href="IMG_0968.png">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-dark: #0a0f16; --surface: #1e1e1e; --primary: #4fc3f7; 
            --primary-glow: rgba(79, 195, 247, 0.4); --text: #ffffff;
            --text-muted: #888888; --border: rgba(255,255,255,0.1);
            --danger: #ef5350; --success: #4caf50;
        }
        
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text); user-select: none; overflow: hidden; }

        /* --- 修正：確保登入頁面即使無圖也能正常置中 --- */
        #login-page { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; /* 強制鋪滿螢幕 */
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; z-index: 999;
            background-color: var(--bg-dark); /* 墊底顏色防黑屏 */
            background-image: linear-gradient(rgba(10, 15, 22, 0.9), rgba(10, 15, 22, 0.9)), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); 
            background-size: 100% 100%, 20px 20px, 20px 20px; 
        }

        .login-glass-card { width: 100%; max-width: 360px; background: rgba(25, 30, 40, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1); text-align: center; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 修正：預留 LOGO 空間，就算找不到圖也不會塌陷 */
        .login-logo-container { width: 75px; height: 75px; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.05); border-radius: 50%; box-shadow: 0 0 15px var(--primary-glow); }
        .login-logo { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }
        
        .login-title { font-size: 22px; font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
        .login-subtitle { font-size: 11px; color: var(--primary); letter-spacing: 3px; margin-bottom: 30px; opacity: 0.8; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 15px 15px 15px 45px; background: rgba(0,0,0,0.3); border: none; border-bottom: 2px solid var(--border); color: var(--text); border-radius: 6px 6px 0 0; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        .input-group input:focus { outline: none; border-bottom: 2px solid var(--primary); background: rgba(0,0,0,0.5); }
        .input-group .icon { position: absolute; left: 15px; top: 15px; font-size: 18px; color: var(--text-muted); }
        .shift-toggle { display: flex; background: rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; margin-bottom: 25px; border: 1px solid var(--border); }
        .shift-toggle input { display: none; }
        .shift-toggle label { flex: 1; text-align: center; padding: 12px; color: var(--text-muted); cursor: pointer; transition: 0.3s; font-size: 14px; }
        .shift-toggle input:checked + label { background: rgba(79, 195, 247, 0.15); color: var(--primary); font-weight: bold; border-bottom: 2px solid var(--primary); }
        .cyber-btn { width: 100%; padding: 16px; background: linear-gradient(90deg, #005a9c, var(--primary)); color: #fff; font-weight: bold; letter-spacing: 2px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px var(--primary-glow); }
        .cyber-btn:active { transform: scale(0.98); }
        .sys-footer { margin-top: 20px; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }

        /* --- 主系統框架 --- */
        #main-app { display: none; overflow-y: auto; height: 100vh; } 
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid #333; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 30px; height: 30px; object-fit: contain; }
        .status-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }
        .content { margin-top: 60px; margin-bottom: 70px; padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--surface); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 12px; gap: 4px; cursor: pointer; padding: 10px; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; }
        .card { background: var(--surface); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .action-btn { width: 100%; padding: 14px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 16px; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        .action-btn:active { background: #39a3d4; }

        .res-box { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; border-left: 5px solid transparent; background: rgba(0,0,0,0.3); }
        .res-warn { border-left-color: var(--danger); background: rgba(239, 83, 80, 0.1); }
        .res-ok { border-left-color: var(--success); background: rgba(76, 175, 80, 0.1); }
        .res-none { border-left-color: var(--text-muted); }

        #video-container { width: 100%; height: 250px; background: #000; border-radius: 8px; overflow: hidden; position: relative; border: 2px solid #333; margin-top: 15px; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--danger); box-shadow: 0 0 10px var(--danger); top: 0; animation: scan 2s infinite linear; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

<div id="login-page">
    <div class="login-glass-card">
        <div class="login-logo-container">
            <img src="IMG_0968.png" alt="🛡️" class="login-logo" onerror="this.style.display='none'">
        </div>
        
        <div class="login-title">M-Security 查詢端</div>
        <div class="login-subtitle">OBSIDIAN GUARD PROTOCOL</div>
        
        <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" id="pUser" placeholder="姓名 (例: 盧家慶)">
        </div>
        <div class="input-group">
            <span class="icon">🔑</span>
            <input type="password" id="pPass" placeholder="工號 (例: D01762)">
        </div>
        
        <div class="shift-toggle">
            <input type="radio" id="shift-day" name="shift" value="日班" checked>
            <label for="shift-day">☀️ 日班</label>
            <input type="radio" id="shift-night" name="shift" value="夜班">
            <label for="shift-night">🌙 夜班</label>
        </div>
        <button class="cyber-btn" onclick="doLogin()">啟 動 防 禦 系 統</button>
        <div class="sys-footer">SECURE CONNECTION ESTABLISHED</div>
    </div>
</div>

<div id="main-app">
    <div class="header">
        <div class="header-left">
            <img src="IMG_0968.png" alt="🛡️" class="header-logo" onerror="this.style.display='none'">
            <div style="font-size: 18px; font-weight: bold;">台灣精銳 警衛查詢端</div>
        </div>
        <div><span class="status-dot" id="online-dot"></span></div>
    </div>

    <div class="content">
        <div id="page-home" class="page">
            <div class="card">
                <h3 style="margin-top:0; color:var(--primary);">🛡️ 值勤人員</h3>
                <p style="font-size: 14px; color: var(--text-muted); line-height: 1.8;">
                    登入人員：<span style="color:var(--text); font-weight:bold;">盧家慶</span> <br>
                    值勤班別：<span id="display-shift" style="color:var(--text);">讀取中...</span><br>
                    資料庫連線：<span style="color:var(--success);">正常 (Firebase)</span><br>
                    環境狀態：<span style="color:var(--primary);">安全</span>
                </p>
            </div>
        </div>

        <div id="page-search" class="page">
            <div class="card">
                <strong style="color:var(--primary);">🔍 綜合資料查核</strong>
                <input type="text" id="qInput" placeholder="輸入工號 / 車牌 / 姓名" oninput="this.value=this.value.toUpperCase()" style="width: 100%; padding: 12px; margin-top: 15px; background: var(--bg-dark); border: 1px solid #333; color: var(--text); border-radius: 6px; box-sizing: border-box; font-size: 16px;">
                <button class="action-btn" onclick="qSearch()" id="btn-search">執 行 查 詢</button>
                
                <div id="res-box" class="res-box">
                    <div id="res-info"></div>
                </div>
            </div>
        </div>

        <div id="page-scan" class="page">
            <div class="card" style="text-align: center; padding: 30px 15px;">
                <div style="font-size: 40px; margin-bottom: 10px;">📷</div>
                <strong style="color:var(--primary);">光學辨識模組</strong>
                <p style="font-size: 12px; color: var(--text-muted);">啟動後將調用裝置後置鏡頭進行掃描</p>
                
                <div id="video-container">
                    <video id="cam-video" autoplay playsinline></video>
                    <div class="scan-line"></div>
                </div>

                <button class="action-btn" id="btn-camera" onclick="toggleCamera()">啟 動 掃 描 儀</button>
            </div>
        </div>

        <div id="page-settings" class="page">
            <div class="card">
                <strong style="color:var(--primary);">⚙️ 系統設定</strong>
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px; margin-top: 10px;">
                    系統版本：V9.0 (黑曜旗艦版)<br>
                    開發代號：OBSIDIAN GUARD
                </p>
                <button class="action-btn" style="background: transparent; border: 1px solid var(--danger); color: var(--danger);" onclick="doLogout()">安 全 登 出</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="switchPage('home', this)"><div class="nav-icon">🏠</div><span>首頁</span></div>
        <div class="nav-item" onclick="switchPage('search', this)"><div class="nav-icon">🔍</div><span>查核</span></div>
        <div class="nav-item" onclick="switchPage('scan', this)"><div class="nav-icon">📷</div><span>掃描</span></div>
        <div class="nav-item" onclick="switchPage('settings', this)"><div class="nav-icon">⚙️</div><span>設定</span></div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", 
        databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", 
        projectId: "factor-security-d1965", 
        appId: "1:864846943143:web:4cfa18cd20d2f712225c82" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    function doLogin() {
        const u = document.getElementById('pUser').value;
        const p = document.getElementById('pPass').value;
        const s = document.querySelector('input[name="shift"]:checked').value;

        if(u === "盧家慶" && p === "D01762") {
            localStorage.setItem('v9_logged_in', 'true');
            localStorage.setItem('v9_shift', s);
            const btn = document.querySelector('.cyber-btn');
            btn.innerText = "驗證成功，連線中..."; btn.style.background = "#4caf50";
            
            setTimeout(() => {
                enterSystem(s);
                btn.innerText = "啟 動 防 禦 系 統"; btn.style.background = ""; 
            }, 600);
        } else { alert("權限不足：識別碼或密碼錯誤。"); }
    }

    function doLogout() {
        localStorage.removeItem('v9_logged_in'); localStorage.removeItem('v9_shift'); localStorage.removeItem('v9_last_page');
        stopCamera(); 
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('login-page').style.display = 'flex';
        document.getElementById('pPass').value = ''; 
    }

    function enterSystem(shift) {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('display-shift').innerText = shift;
        const lastPage = localStorage.getItem('v9_last_page') || 'home';
        switchPage(lastPage, null);
    }

    function switchPage(pageId, navElement) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        
        if (navElement) { navElement.classList.add('active'); } 
        else { const defaultNav = document.querySelector(`.nav-item[onclick*="${pageId}"]`); if(defaultNav) defaultNav.classList.add('active'); }
        
        localStorage.setItem('v9_last_page', pageId);
        if(pageId !== 'scan') { stopCamera(); }
    }

    async function qSearch() {
        const val = document.getElementById('qInput').value.trim();
        const resBox = document.getElementById('res-box');
        const resInfo = document.getElementById('res-info');
        const btn = document.getElementById('btn-search');
        
        if(!val) { alert("請輸入查詢條件！"); return; }

        resBox.style.display = 'block';
        resBox.className = "res-box res-none";
        resInfo.innerHTML = "<span style='color:var(--primary);'>📡 正在透過加密通道比對資料庫...</span>";
        btn.innerText = "查 詢 中..."; btn.disabled = true;

        try {
            const [snapBlack, snapEmp] = await Promise.all([
                db.ref('blacklist_data').once('value'),
                db.ref('employee_list').once('value')
            ]);

            let found = false;

            snapBlack.forEach(c => {
                const d = c.val();
                if(d.name === val || d.id === val || d.plate === val) {
                    resBox.className = "res-box res-warn";
                    resInfo.innerHTML = `
                        <div style="font-size:14px; color:var(--danger); margin-bottom:5px; font-weight:bold;">⚠️ 系統警告：黑名單人員</div>
                        <div style="font-size:24px; color:#fff; font-weight:bold; letter-spacing:1px;">${d.name || val}</div>
                        <div style="font-size:15px; color:#ccc; margin-top:8px;">違規紀錄：${d.reason || '無資料'}</div>
                        <div style="font-size:12px; color:var(--danger); margin-top:10px;">請提高警覺並通報主管！</div>
                    `;
                    found = true;
                }
            });

            if(!found) {
                snapEmp.forEach(c => {
                    const d = c.val();
                    if(d.name === val || d.id === val || d.plate === val) {
                        resBox.className = "res-box res-ok";
                        resInfo.innerHTML = `
                            <div style="font-size:14px; color:var(--success); margin-bottom:5px; font-weight:bold;">✅ 驗證通過：內部員工</div>
                            <div style="font-size:24px; color:#fff; font-weight:bold; letter-spacing:1px;">${d.name}</div>
                            <div style="font-size:15px; color:#ccc; margin-top:8px;">所屬單位：${d.reason || '未註記'}</div>
                        `;
                        found = true;
                    }
                });
            }

            if(!found) {
                resBox.className = "res-box res-none";
                resInfo.innerHTML = `<div style="color:var(--text-muted); text-align:center;">🔍 資料庫中無「${val}」的相關紀錄。</div>`;
            }
        } catch (error) {
            resBox.className = "res-box res-warn";
            resInfo.innerHTML = "❌ 連線失敗，請檢查網路狀態。";
        }

        btn.innerText = "執 行 查 詢"; btn.disabled = false;
    }

    let localStream = null;
    
    async function toggleCamera() {
        const video = document.getElementById('cam-video');
        const container = document.getElementById('video-container');
        const btn = document.getElementById('btn-camera');

        if (localStream) {
            stopCamera();
        } else {
            try {
                btn.innerText = "連 線 中...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                localStream = stream;
                video.srcObject = stream;
                container.style.display = 'block';
                btn.innerText = "關 閉 掃 描 儀";
                btn.style.background = "transparent";
                btn.style.border = "1px solid var(--danger)";
                btn.style.color = "var(--danger)";
            } catch (err) {
                alert("無法啟動相機！請確認已允許網頁使用相機權限。");
                btn.innerText = "啟 動 掃 描 儀";
            }
        }
    }

    function stopCamera() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
            document.getElementById('video-container').style.display = 'none';
            const btn = document.getElementById('btn-camera');
            btn.innerText = "啟 動 掃 描 儀";
            btn.style.background = "var(--primary)";
            btn.style.border = "none";
            btn.style.color = "#000";
        }
    }

    // --- 確保初始畫面不會全黑，強制顯示登入頁 ---
    window.onload = () => {
        document.getElementById('login-page').style.display = 'flex'; 
        if(localStorage.getItem('v9_logged_in') === 'true') {
            const savedShift = localStorage.getItem('v9_shift') || '未知';
            enterSystem(savedShift);
        }
    };
</script>
</body>
</html>

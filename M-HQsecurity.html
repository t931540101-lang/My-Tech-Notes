<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SECURITY HQ | 台灣精銳指揮中心</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --hq-primary: #00e5ff;
            --hq-bg: #0f172a;
            --hq-card: #1e293b;
            --hq-border: #334155;
            --danger: #ef4444;
            --success: #10b981;
            --vip-gold: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; min-height: 100vh; background-color: var(--hq-bg); color: #f8fafc; font-family: -apple-system, "Microsoft JhengHei", sans-serif; overflow-x: hidden; }

        /* === 🚪 戰術大門 === */
        #login-gate { display: flex; height: 100vh; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); transition: opacity 0.5s; }
        .login-panel { width: 90%; max-width: 380px; padding: 30px; background: var(--hq-card); border-radius: 16px; border: 2px solid var(--hq-border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-field { width: 100%; background: #0f172a; border: 1.5px solid var(--hq-border); padding: 16px; color: white; margin-bottom: 20px; border-radius: 8px; font-size: 16px; outline: none; }
        .input-field:focus { border-color: var(--hq-primary); }
        .btn-access { width: 100%; background: var(--hq-primary); color: #0f172a; padding: 16px; font-weight: 900; border: none; border-radius: 8px; font-size: 18px; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-access:active { transform: scale(0.98); }

        /* === 🛡️ HQ 主系統 === */
        #main-system { display: none; flex-direction: column; }
        .top-nav { background: #000; border-bottom: 3px solid var(--hq-primary); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { display: flex; background: #111; overflow-x: auto; sticky: top; top: 0; z-index: 50; }
        .tab { flex: 1; text-align: center; padding: 18px 10px; cursor: pointer; color: #94a3b8; font-weight: bold; min-width: 100px; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--hq-primary); background: #1e293b; border-bottom-color: var(--hq-primary); }

        .content-section { display: none; padding: 15px; animation: fadeIn 0.4s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 📊 數據看盤 */
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px; }
        .stat-card { background: var(--hq-card); border: 1.5px solid var(--hq-border); padding: 15px; border-radius: 12px; border-left: 4px solid var(--hq-primary); }
        .stat-val { font-size: 28px; font-weight: 900; color: var(--hq-primary); display: block; }
        .stat-label { font-size: 12px; color: #94a3b8; font-weight: bold; }

        /* 📋 清單與日誌 */
        .panel { background: var(--hq-card); border: 1.5px solid var(--hq-border); border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        .panel-header { padding: 12px 15px; background: rgba(0,0,0,0.2); font-weight: 900; color: var(--hq-primary); font-size: 14px; border-bottom: 1px solid var(--hq-border); display: flex; justify-content: space-between; }
        .scroll-list { max-height: 400px; overflow-y: auto; padding: 10px; }
        .data-item { background: #162030; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #334155; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .data-item.vip { border-left-color: var(--vip-gold); }
        .log-time { color: var(--hq-primary); font-family: monospace; font-weight: bold; margin-right: 8px; }
        
        .btn-del { background: var(--danger); color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="login-panel">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="color:white; font-size:32px; font-weight:900; letter-spacing:3px; margin:0;">台灣精銳</h1>
                <div style="color:var(--hq-primary); font-size:14px; font-weight:bold; letter-spacing:2px; margin-top:5px;">M-SECURITY HQ 指揮中心</div>
            </div>
            <input type="text" id="hqUser" class="input-field" placeholder="指揮官姓名">
            <input type="password" id="hqPass" class="input-field" placeholder="最高授權密碼">
            <button onclick="handleHQLogin()" class="btn-access">授權登入基地</button>
        </div>
    </div>

    <div id="main-system">
        <div class="top-nav">
            <div style="font-weight:900; font-size:20px; letter-spacing:2px;">M-SECURITY HQ</div>
            <div style="background:rgba(0,229,255,0.1); color:var(--hq-primary); padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold;">
                指揮官：<span id="display-commander">盧家慶</span>
            </div>
        </div>

        <nav class="nav-tabs">
            <div class="tab active" onclick="switchHQTab('tab-status', this)">即時戰情</div>
            <div class="tab" onclick="switchHQTab('tab-deploy', this)">名單部署</div>
            <div class="tab" onclick="switchHQTab('tab-auth', this)">權限控管</div>
        </nav>

        <div id="tab-status" class="content-section active">
            <div class="stat-grid">
                <div class="stat-card"><span class="stat-val" id="val-onsite">0</span><span class="stat-label">場內總人數</span></div>
                <div class="stat-card"><span class="stat-val" id="val-vip" style="color:var(--vip-gold);">0</span><span class="stat-label">今日 VIP 流量</span></div>
            </div>
            <div class="panel">
                <div class="panel-header">📡 前線動態即時串流 (LIVE)</div>
                <div id="live-log-feed" class="scroll-list"></div>
            </div>
        </div>

        <div id="tab-deploy" class="content-section">
            <div class="panel" style="padding:15px;">
                <h3 style="margin:0 0 15px 0; color:var(--hq-primary);">快速名單部署</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button id="btn-type-emp" style="flex:1; padding:10px; border-radius:6px; border:none; font-weight:bold; background:var(--hq-primary);" onclick="setDeployType('emp')">一般員工</button>
                    <button id="btn-type-vip" style="flex:1; padding:10px; border-radius:6px; border:none; font-weight:bold; background:#334155; color:white;" onclick="setDeployType('vip')">VIP 貴賓</button>
                </div>
                <input type="text" id="deployName" class="input-field" style="margin-bottom:10px;" placeholder="姓名">
                <input type="text" id="deployId" class="input-field" placeholder="車牌/工號">
                <button class="btn-access" onclick="executeDeploy()">執行雲端部署</button>
            </div>
            <div class="panel">
                <div class="panel-header">📂 部署清單監控 <span id="list-mode-text">一般員工</span></div>
                <div id="db-list-display" class="scroll-list"></div>
            </div>
        </div>

        <div id="tab-auth" class="content-section">
            <div class="panel" style="padding:15px;">
                <h3 style="margin:0 0 15px 0; color:var(--hq-primary);">核發人員值勤授權</h3>
                <input type="text" id="newGuardName" class="input-field" style="margin-bottom:10px;" placeholder="弟兄姓名">
                <input type="text" id="newGuardPwd" class="input-field" placeholder="設定授權密碼">
                <button class="btn-access" onclick="issueGuardAuth()">核發電子通行證</button>
            </div>
            <div class="panel">
                <div class="panel-header">🟢 目前已授權人員</div>
                <div id="guard-auth-list" class="scroll-list"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", projectId: "factor-security-d1965" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let deployType = 'emp';
        let viewType = 'emp';

        function handleHQLogin() {
            const u = document.getElementById('hqUser').value.trim();
            const p = document.getElementById('hqPass').value.trim();
            if (u === '盧家慶' && p === 'D01762') {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-system').style.display = 'flex';
                initHQManager();
            } else { alert('❌ 授權失敗！'); }
        }

        function switchHQTab(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); document.getElementById(id).classList.add('active');
            if(id === 'tab-deploy') loadDBList();
        }

        function setDeployType(t) {
            deployType = t;
            document.getElementById('btn-type-emp').style.background = t === 'emp' ? 'var(--hq-primary)' : '#334155';
            document.getElementById('btn-type-vip').style.background = t === 'vip' ? 'var(--hq-primary)' : '#334155';
        }

        function executeDeploy() {
            const n = document.getElementById('deployName').value.trim();
            const i = document.getElementById('deployId').value.trim().toUpperCase();
            if(!n || !i) return alert("資料不全");
            const path = deployType === 'emp' ? 'employee_list' : 'vip_list';
            db.ref(path).push({ name: n, plate: i, id: i, timestamp: Date.now() }).then(() => {
                alert("✅ 部署成功！"); document.getElementById('deployName').value=''; document.getElementById('deployId').value='';
            });
        }

        function initHQManager() {
            // 場內人數
            db.ref('visitor_logs').on('value', s => {
                let count = 0; s.forEach(c => { if(!c.val().leaveTime) count++; });
                document.getElementById('val-onsite').innerText = count;
            });
            // VIP 人數
            db.ref('vip_list').on('value', s => { document.getElementById('val-vip').innerText = s.numChildren(); });
            // 日誌
            db.ref('search_logs').limitToLast(15).on('value', s => {
                const feed = document.getElementById('live-log-feed'); feed.innerHTML = '';
                s.forEach(c => { const d = c.val(); feed.innerHTML = `<div class="data-item"><span class="log-time">[${d.time}]</span><b>${d.user}</b> 檢索了 <b>${d.query}</b></div>` + feed.innerHTML; });
            });
            // 授權名單
            db.ref('guard_accounts').on('value', s => {
                const list = document.getElementById('guard-auth-list'); list.innerHTML = '';
                s.forEach(c => { list.innerHTML += `<div class="data-item"><div><b>${c.key}</b><br><small style="color:var(--hq-primary)">PW: ${c.val().password}</small></div><button class="btn-del" onclick="db.ref('guard_accounts/${c.key}').remove()">撤銷</button></div>`; });
            });
        }

        function loadDBList() {
            const path = deployType === 'emp' ? 'employee_list' : 'vip_list';
            db.ref(path).on('value', s => {
                const list = document.getElementById('db-list-display'); list.innerHTML = '';
                s.forEach(c => { list.innerHTML += `<div class="data-item ${deployType==='vip'?'vip':''}"><div><b>${c.val().name}</b><br><small>${c.val().plate}</small></div><button class="btn-del" onclick="db.ref('${path}/${c.key}').remove()">撤除</button></div>`; });
            });
        }

        function issueGuardAuth() {
            const n = document.getElementById('newGuardName').value.trim();
            const p = document.getElementById('newGuardPwd').value.trim();
            if(n && p) db.ref('guard_accounts/'+n).set({ password: p }).then(() => { alert("核發成功！"); document.getElementById('newGuardName').value=''; document.getElementById('newGuardPwd').value=''; });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工出勤打卡系統</title>
    <style>
        :root { --primary: #0d6efd; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: #fff; width: 100%; max-width: 350px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; font-size: 1.25rem; color: #212529; margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
        input:focus { outline: none; border-color: var(--primary); }
        .clock { text-align: center; font-size: 2.2rem; font-weight: bold; margin: 15px 0; color: #212529; font-variant-numeric: tabular-nums; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; color: #fff; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-in { background: #198754; }
        .btn-out { background: #6c757d; }
        button:active { transform: scale(0.96); }
        .log-box { max-height: 160px; overflow-y: auto; font-size: 0.85rem; border-top: 1px solid #eee; padding-top: 10px; }
        .log-item { padding: 8px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; align-items: flex-start; }
        .log-info { color: #6c757d; font-size: 0.75rem; margin-bottom: 3px; }
        .badge { padding: 3px 6px; border-radius: 4px; color: #fff; font-size: 0.7rem; font-weight: bold; margin-left: 5px; }
        .status-ok { background: #198754; }
        .status-late { background: #dc3545; }
        .status-early { background: #fd7e14; }
    </style>
</head>
<body>

<div class="card">
    <h2>員工出勤打卡系統</h2>
    
    <div class="input-row">
        <input type="text" id="empId" placeholder="員工工號" oninput="saveEmpProfile()">
        <input type="text" id="empName" placeholder="員工姓名" oninput="saveEmpProfile()">
    </div>

    <div id="clock" class="clock">00:00:00</div>
    
    <div class="btn-row">
        <button class="btn-in" onclick="saveEmpRecord('上班')">上班打卡</button>
        <button class="btn-out" onclick="saveEmpRecord('下班')">下班打卡</button>
    </div>

    <div style="font-weight:bold; font-size:0.85rem; color:#495057; margin-bottom:5px;">個人打卡紀錄 (本機)</div>
    <div id="logHistory" class="log-box"></div>
</div>

<script>
    function updateTime() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', {hour12: false});
    }
    setInterval(updateTime, 1000);
    updateTime();

    function saveEmpProfile() {
        localStorage.setItem('e_id', document.getElementById('empId').value);
        localStorage.setItem('e_name', document.getElementById('empName').value);
    }

    function saveEmpRecord(type) {
        const id = document.getElementById('empId').value || "未填工號";
        const name = document.getElementById('empName').value || "未填姓名";
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-TW', {hour12: false});
        const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
        
        let status = "正常";
        let badgeClass = "status-ok";
        const timeHHMM = timeStr.substring(0, 5);

        // 考勤判定邏輯 (08:30 / 17:30)
        if (type === '上班' && timeHHMM > '08:30') {
            status = "遲到";
            badgeClass = "status-late";
        } else if (type === '下班' && timeHHMM < '17:30') {
            status = "早退";
            badgeClass = "status-early";
        }

        const entry = { id, name, type, dateStr, timeStr, status, badgeClass };
        
        let logs = JSON.parse(localStorage.getItem('empLogs')) || [];
        logs.unshift(entry);
        if (logs.length > 5) logs.pop(); 
        
        localStorage.setItem('empLogs', JSON.stringify(logs));
        renderEmpLogs();
    }
    
    function renderEmpLogs() {
        const logs = JSON.parse(localStorage.getItem('empLogs')) || [];
        const container = document.getElementById('logHistory');
        
        container.innerHTML = logs.map(log => `
            <div class="log-item">
                <div>
                    <div class="log-info">工號:${log.id} | 姓名:${log.name}</div>
                    <strong>${log.type}</strong> ${log.dateStr} ${log.timeStr}
                </div>
                <span class="badge ${log.badgeClass}">${log.status}</span>
            </div>
        `).join('');
    }

    window.onload = () => {
        document.getElementById('empId').value = localStorage.getItem('e_id') || '';
        document.getElementById('empName').value = localStorage.getItem('e_name') || '';
        renderEmpLogs();
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Security 監控中心</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #00ff88; }
        h2 { font-size: 1.2rem; color: #00ff88; margin-top: 0; }
        .status-on { color: #00ff88; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 5px; border: none; }
        button { background: #00ff88; color: #000; font-weight: bold; cursor: pointer; }
        #log-container { font-size: 0.85rem; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px dotted #333; padding-bottom: 3px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>M-Security 狀態</h2>
        <p>當前模式：<span class="status-on">正式啟用 (Active)</span></p>
        <p>主控端：Win10 22H2 (i5-9400F)</p>
    </div>

    <div class="card">
        <h2>日誌快速記錄</h2>
        <input type="text" id="logInput" placeholder="輸入安全性事件...">
        <button onclick="saveLog()">寫入加密日誌</button>
    </div>

    <div class="card">
        <h2>存檔數據</h2>
        <div id="log-container"></div>
        <button style="background: #ff4444; color: white; margin-top: 10px;" onclick="clearLogs()">清除所有紀錄</button>
    </div>

    <script>
        function saveLog() {
            const input = document.getElementById('logInput');
            if (!input.value) return;
            const logs = JSON.parse(localStorage.getItem('m_security_logs') || '[]');
            const newEntry = {
                time: new Date().toLocaleString(),
                msg: input.value
            };
            logs.unshift(newEntry);
            localStorage.setItem('m_security_logs', JSON.stringify(logs));
            input.value = '';
            displayLogs();
        }

        function displayLogs() {
            const container = document.getElementById('log-container');
            const logs = JSON.parse(localStorage.getItem('m_security_logs') || '[]');
            container.innerHTML = logs.map(l => `
                <div class="log-entry">
                    <small style="color: #888;">[${l.time}]</small><br>${l.msg}
                </div>
            `).join('');
        }

        function clearLogs() {
            if(confirm('確定要銷毀所有本地日誌嗎？')) {
                localStorage.removeItem('m_security_logs');
                displayLogs();
            }
        }

        // 初始載入
        displayLogs();
    </script>
</body>
</html>

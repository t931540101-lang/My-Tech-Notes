<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車輛管制登記簿 - 黑曜石計畫</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f4f4; color: #333; }
        .container { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 1.2rem; margin-bottom: 15px; border-bottom: 2px solid #2c3e50; padding-bottom: 5px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; font-size: 0.9rem; margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; }
        .btn-save { background: #27ae60; }
        .btn-clear { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        th { background: #2c3e50; color: #white; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚚 車輛進出管制</h2>
    
    <div class="form-group">
        <label>月/日</label>
        <input type="text" id="date" placeholder="如: 3.14">
    </div>
    <div class="form-group">
        <label>公司行號</label>
        <input type="text" id="company">
    </div>
    <div class="form-group">
        <label>姓名</label>
        <input type="text" id="name">
    </div>
    <div class="form-group">
        <label>車號</label>
        <input type="text" id="carId">
    </div>
    <div style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1;">
            <label>進貨時間</label>
            <input type="time" id="inTime">
        </div>
        <div class="form-group" style="flex:1;">
            <label>出貨時間</label>
            <input type="time" id="outTime">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">新增登記</button>
        <button class="btn-clear" onclick="clearAll()">清空列表</button>
    </div>

    <table id="recordTable">
        <thead>
            <tr>
                <th>日期</th>
                <th>進/出時間</th>
                <th>公司/車號</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // 初始化日期
    const now = new Date();
    document.getElementById('date').value = (now.getMonth() + 1) + '.' + now.getDate();

    function saveData() {
        const data = {
            date: document.getElementById('date').value,
            inTime: document.getElementById('inTime').value,
            outTime: document.getElementById('outTime').value,
            company: document.getElementById('company').value,
            name: document.getElementById('name').value,
            carId: document.getElementById('carId').value
        };

        if(!data.company || !data.carId) { alert('請填寫公司與車號！'); return; }

        let list = JSON.parse(localStorage.getItem('carLogs') || '[]');
        list.push(data);
        localStorage.setItem('carLogs', JSON.stringify(list));
        renderTable();
        
        // 清空輸入框（保留日期）
        ['company', 'name', 'carId', 'inTime', 'outTime'].forEach(id => document.getElementById(id).value = '');
    }

    function renderTable() {
        const list = JSON.parse(localStorage.getItem('carLogs') || '[]');
        const body = document.getElementById('tableBody');
        body.innerHTML = list.map(item => `
            <tr>
                <td>${item.date}</td>
                <td>${item.inTime}<br>${item.outTime}</td>
                <td>${item.company}<br>${item.carId}</td>
            </tr>
        `).reverse().join(''); // 最新顯示在最上面
    }

    function clearAll() {
        if(confirm('確定要清空所有登記資料嗎？')) {
            localStorage.removeItem('carLogs');
            renderTable();
        }
    }

    window.onload = renderTable;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑曜石計畫 - 核心系統</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #bb86fc; /* 科技紫 */
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --success: #03dac6;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        /* 標籤切換導航 */
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        .nav-btn {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 8px;
            font-weight: bold;
        }
        .nav-btn.active {
            background: var(--accent);
            color: var(--bg-dark);
        }

        /* 內容區塊 */
        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }

        input { background: #333; color: white; border: 1px solid #444; }
        button { background: var(--success); color: #000; font-weight: bold; cursor: pointer; }

        .log-item {
            border-bottom: 1px solid #333;
            padding: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--accent);">💎 OBSIDIAN PROJECT</h2>

    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchView('hunter')">小神捕</button>
        <button class="nav-btn" onclick="switchView('hq')">HQ 總部</button>
    </div>

    <section id="view-hunter" class="view-section active">
        <div class="card">
            <h3>🔍 快速查詢/紀錄</h3>
            <input type="text" id="searchKey" placeholder="輸入車牌或關鍵字...">
            <button onclick="handleSearch()">執行查詢</button>
        </div>
        <div class="card" id="searchResult">
            <p style="color: var(--text-dim);">等待輸入...</p>
        </div>
    </section>

    <section id="view-hq" class="view-section">
        <div class="card">
            <h3>📊 系統管理</h3>
            <button style="background: #cf6679;" onclick="ObsidianDB.clearAll()">清空所有本機資料</button>
        </div>
        <div class="card">
            <h3>📅 最近活動日誌</h3>
            <div id="logList"></div>
        </div>
    </section>
</div>

<script>
    // --- 核心資料模組 (DRY 原則) ---
    const ObsidianDB = {
        save: (key, data) => {
            const wrappedData = { timestamp: new Date().getTime(), content: data };
            localStorage.setItem(`OBSIDIAN_${key}`, JSON.stringify(wrappedData));
            ObsidianDB.addLog(`更新了 ${key}`);
        },
        load: (key) => {
            const raw = localStorage.getItem(`OBSIDIAN_${key}`);
            return raw ? JSON.parse(raw) : null;
        },
        addLog: (msg) => {
            let logs = JSON.parse(localStorage.getItem('OBSIDIAN_LOGS')) || [];
            logs.unshift(`${new Date().toLocaleTimeString()} - ${msg}`);
            localStorage.setItem('OBSIDIAN_LOGS', JSON.stringify(logs.slice(0, 10)));
            renderLogs();
        },
        clearAll: () => {
            if(confirm('確定要刪除所有資料嗎？這動作無法復原。')) {
                localStorage.clear();
                location.reload();
            }
        }
    };

    // --- UI 邏輯 ---
    function switchView(viewName) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(`view-${viewName}`).classList.add('active');
        event.currentTarget.classList.add('active');
        if(viewName === 'hq') renderLogs();
    }

    function handleSearch() {
        const key = document.getElementById('searchKey').value;
        if(!key) return;
        
        // 模擬查詢與自動存檔
        ObsidianDB.save('LAST_SEARCH', key);
        document.getElementById('searchResult').innerHTML = `
            <p style="color: var(--success);">已記錄查詢：${key}</p>
            <small>時間：${new Date().toLocaleString()}</small>
        `;
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('OBSIDIAN_LOGS')) || [];
        const list = document.getElementById('logList');
        list.innerHTML = logs.map(l => `<div class="log-item">${l}</div>`).join('');
    }

    // 初始化時加載日誌
    window.onload = renderLogs;
</script>

</body>
</html>

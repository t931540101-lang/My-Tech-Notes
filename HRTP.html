<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Web Service - 請假單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
        }

        /* 導覽列樣式 */
        .navbar-custom {
            background-color: #222;
            padding: 10px 20px;
        }
        .navbar-brand img { width: 24px; filter: invert(1); }
        .nav-link { color: #ccc !important; font-size: 0.9rem; }
        .nav-link:hover { color: #fff !important; }
        
        .lang-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            margin-left: 8px;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-tw { background-color: #e67e22; }
        .bg-th { background-color: #d35400; }
        .bg-id { background-color: #e74c3c; }

        /* 主容器樣式 */
        .main-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }

        .form-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #ced4da;
            padding: 10px;
            background-color: #fcfcfc;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }

        .section-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .btn-query { background-color: #0044cc; color: white; min-width: 100px; }
        .btn-submit { background-color: #4488ff; color: white; min-width: 100px; }

        /* 底部 Toggle Theme 按鈕 */
        .theme-toggle {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background-color: #4b39d7;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        /* 模擬背景裝飾圖 (示意) */
        .bg-decoration {
            position: absolute;
            z-index: -1;
            opacity: 0.1;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" alt="logo"></a>
        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#">首頁</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">請假單</a></li>
                <li class="nav-item"><a class="nav-link" href="#">未刷單</a></li>
            </ul>
        </div>
        <div class="d-flex align-items-center">
            <div class="lang-btn bg-tw">TW</div>
            <div class="lang-btn bg-th">TH</div>
            <div class="lang-btn bg-id">ID</div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="main-container">
        <h2 class="section-title">請假單</h2>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">身分證號後四碼</label>
                    <div class="input-group">
                        <input type="password" class="form-control" value="1234">
                        <span class="input-group-text bg-transparent border-start-0">👁️</span>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">工號</label>
                    <input type="text" class="form-control" placeholder="d01762">
                </div>
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-control" disabled style="background-color: #e9ecef;">
                </div>
                <div class="mb-3">
                    <label class="form-label">請假名稱</label>
                    <select class="form-select">
                        <option selected>請選擇...</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">開始時間</label>
                    <input type="date" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">結束時間</label>
                    <input type="date" class="form-control">
                </div>
            </div>

            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">部門</label>
                    <input type="text" class="form-control" disabled style="background-color: #e9ecef;">
                </div>
                <div class="mb-3">
                    <label class="form-label">1級主管</label>
                    <input type="text" class="form-control" disabled style="background-color: #e9ecef;">
                </div>
                <div class="mb-3">
                    <label class="form-label">2級主管</label>
                    <input type="text" class="form-control" disabled style="background-color: #e9ecef;">
                </div>
                <div class="mb-3">
                    <label class="form-label">未休時數</label>
                    <input type="text" class="form-control" disabled style="background-color: #e9ecef;">
                </div>
                <div class="mb-3">
                    <label class="form-label">預計請假時數</label>
                    <input type="text" class="form-control" placeholder="">
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <button class="btn btn-query me-2">查詢</button>
            <button class="btn btn-submit">送出</button>
        </div>

        <div class="mt-5 text-center text-muted" style="font-size: 0.7rem;">
            <p>© APEX DYNAMICS 2026</p>
        </div>
    </div>
</div>

<button class="theme-toggle">Toggle theme ▾</button>

</body>
</html>

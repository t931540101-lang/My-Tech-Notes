<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HQ_Gateway_v2.0</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #f4f4f4; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a1a1a; color: #fff; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; }
        
        /* 導航切換 */
        nav { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; color: #888; transition: 0.3s; }
        .tab.active { color: #000; border-bottom: 3px solid #1a1a1a; font-weight: bold; }

        .container { flex: 1; padding: 12px; overflow-y: auto; }
        .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; }
        h3 { margin: 0 0 15px 0; font-size: 1rem; border-left: 5px solid #1a1a1a; padding-left: 10px; }

        /* 按鈕設計：左右並排不爆框 */
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px 5px; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; color: #fff; }
        .btn-start { background: #222; }
        .btn-end { background: #666; }
        
        /* 傳送門列表 */
        .portal-item { width: 100%; padding: 12px; margin-bottom: 8px; background: #f9f9f9; border: 1px solid #eee; border-radius: 6px; text-align: left; font-size: 14px; color: #333; }

        #log-display { font-size: 13px; color: #666; line-height: 1.8; margin-top: 10px; }
    </style>
</head>
<body>

<header>HQ COMMAND NETWORK</header>

<nav>
    <div class="tab active" onclick="switchTab('punch')">打卡控制</div>
    <div class="tab" onclick="switchTab('portal')">系統傳送</div>
    <div class="tab" onclick="switchTab('data')">紀錄</div>
</nav>

<div class="container">
    <div id="punch" class="page">
        <div class="card">
            <h3>⚡ 勤務狀態發佈</h3>
            <div class="btn-group">
                <button class="btn btn-start" onclick="saveLog('上班')">▶️ 啟動勤務</button>
                <button class="btn btn-end" onclick="saveLog('下班')">⏹️ 結束勤務</button>
            </div>
            <div id="log-display"></div>
        </div>
    </div>

    <div id="portal" class="page" style="display:none;">
        <div class="card">
            <h3>📂 聯動系統入口</h3><button class="portal-item" onclick="window.location.href='https://t931540101-lang.github.io/field-utility/09_黑雲端班表系統_V4.3.html'">🛡️ 黑雲端班表系統 V4.3</button>

<button class="portal-item" onclick="window.location.href='https://t931540101-lang.github.io/field-utility/08_警衛室人員總班表.html'">📊 警衛室人員總班表</button>

            <p style="font-size:11px; color:gray; text-align:center;">此處將整合你過去 14 套系統</p>
        </div>
    </div>

    <div id="data" class="page" style="display:none;">
        <div class="card">
            <h3>📜 歷史操作日誌</h3>
            <p style="font-size:12px; color:gray;">數據僅保存在此裝置的 Local Storage。</p>
        </div>
    </div>
</div>

<script>
    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    function saveLog(type) {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0');
        const record = `[${type}] ${timeStr}`;
        
        let logs = JSON.parse(localStorage.getItem('hq_v2') || '[]');
        logs.unshift(record);
        localStorage.setItem('hq_v2', JSON.stringify(logs.slice(0, 8)));
        showLogs();
        alert(record + ' 成功！');
    }

    function showLogs() {
        const logs = JSON.parse(localStorage.getItem('hq_v2') || '[]');
        document.getElementById('log-display').innerHTML = logs.map(l => `• ${l}`).join('<br>');
    }
    showLogs();
</script>
</body>
</html>

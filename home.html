<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Web Service - 首頁</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8f9fa;
            overflow: hidden; /* 防止首頁出現捲軸 */
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 導覽列 (與請假頁一致) */
        .navbar-custom {
            background-color: #222;
            padding: 10px 20px;
        }
        .lang-btn {
            width: 35px; height: 35px; border-radius: 50%;
            border: none; margin-left: 8px; font-size: 0.7rem;
            font-weight: bold; color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .bg-tw { background-color: #e67e22; }
        .bg-th { background-color: #d35400; }
        .bg-id { background-color: #e74c3c; }

        /* 首頁核心內容 */
        .home-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .home-title {
            font-size: 4rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 0;
        }

        .home-subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: #888;
        }

        /* 背景裝飾物模擬 */
        .deco-img {
            position: absolute;
            z-index: -1;
            opacity: 0.15;
            filter: grayscale(100%);
        }
        .deco-left { top: 10%; left: -50px; transform: rotate(-15deg); width: 300px; }
        .deco-right { bottom: 10%; right: -50px; transform: rotate(15deg); width: 300px; }

        /* 頁尾版權 */
        .footer-home {
            position: absolute;
            bottom: 40px;
            left: 10%; /* 依據照片，Logo和文字偏左 */
            text-align: left;
            color: #999;
            font-size: 0.8rem;
        }
        .footer-logo {
            width: 20px;
            margin-bottom: 5px;
            opacity: 0.6;
        }

        .theme-toggle {
            position: fixed; bottom: 10px; right: 10px;
            background-color: #4b39d7; color: white; border: none;
            padding: 5px 15px; border-radius: 5px; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom w-100">
    <div class="container-fluid">
        <a class="navbar-brand" href="#"><img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" style="width:24px; filter:invert(1);" alt="logo"></a>
        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link text-white" href="#">首頁</a></li>
                <li class="nav-item"><a class="nav-link text-secondary" href="index.html">請假單</a></li>
                <li class="nav-item"><a class="nav-link text-secondary" href="#">未刷單</a></li>
            </ul>
        </div>
        <div class="d-flex align-items-center">
            <div class="lang-btn bg-tw">TW</div>
            <div class="lang-btn bg-th">TH</div>
            <div class="lang-btn bg-id">ID</div>
        </div>
    </div>
</nav>

<main class="home-content">
    <img src="https://cdn-icons-png.flaticon.com/512/0/191.png" class="deco-img deco-left" alt="deco">
    <img src="https://cdn-icons-png.flaticon.com/512/0/191.png" class="deco-img deco-right" alt="deco">

    <h1 class="home-title">HR web service</h1>
    <p class="home-subtitle">Designed for IT</p>

    <div class="footer-home">
        <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" class="footer-logo" alt="logo"><br>
        © APEX DYNAMICS 2026
    </div>
</main>

<button class="theme-toggle">Toggle theme ▾</button>

</body>
</html>

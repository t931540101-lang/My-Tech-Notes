<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廠商餐費 | 雲端版</title>
    <link rel="icon" href="IMG_0177.jpeg">
    <link rel="apple-touch-icon" href="IMG_0177.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; padding: 15px; }
        .card { background: white; border: 2px solid #1e293b; border-radius: 12px; box-shadow: 4px 4px 0px #cbd5e1; padding: 20px; margin-bottom: 20px; }
        input, select { border: 2px solid #cbd5e1; border-radius: 8px; padding: 12px; font-size: 18px; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 2px solid #1e293b; padding: 12px 8px; text-align: center; font-size: 18px; font-weight: bold; }
        th { background-color: #e2e8f0; }
        .weekend { background-color: #fff9c4; }
        .vendor-summary { background-color: #f0fdf4; color: #166534; font-size: 16px; }
        .month-picker { background-color: #1e293b; color: white; border: none; padding: 10px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <div class="flex justify-between items-center mb-4 border-b-4 border-slate-800 pb-2">
            <h2 class="text-2xl font-black text-slate-800">廠商餐費</h2>
            <input type="month" id="monthSelector" class="month-picker w-auto text-lg font-bold" onchange="changeMonth()">
        </div>
        
        <div class="space-y-4">
            <input type="date" id="entryDate">
            <div class="flex gap-2">
                <select id="vendorSelect" onchange="checkVendor(this.value)">
                    <option value="俊丰">俊丰</option>
                    <option value="祥箐">祥箐</option>
                    <option value="CUSTOM">➕ 自定義</option>
                </select>
                <input type="number" id="quantity" value="1" class="w-24 text-center">
            </div>
            <input type="text" id="customVendor" placeholder="請輸入廠商名稱" class="hidden">
            <button onclick="addEntry()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-xl shadow-lg active:scale-95 transition-transform">
                寫入雲端並存檔 ✍️
            </button>
        </div>
    </div>

    <div class="card overflow-hidden" style="padding: 5px;">
        <table id="mainTable">
            <thead>
                <tr>
                    <th style="width: 25%;">日期</th>
                    <th>廠商</th>
                    <th style="width: 25%;">金額</th>
                    <th style="width: 15%;">🗑️</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot id="tableFoot"></tfoot>
        </table>
        <button onclick="clearCurrentMonth()" class="w-full mt-4 py-2 text-red-500 bg-red-50 text-sm font-bold border border-red-200 rounded">
            ⚠️ 月底對完帳清空【本月】紀錄
        </button>
    </div>

    <script>
        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI907S1YdCWor48",
            authDomain: "factor-security-d1965.firebaseapp.com",
            databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com",
            projectId: "factor-security-d1965",
            storageBucket: "factor-security-d1965.firebasestorage.app",
            messagingSenderId: "864846943143",
            appId: "1:864846943143:web:4cfa18cd20d2f712225c82"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentListenerRef = null; // 用來記錄目前監聽的雲端節點

        // 🚀 系統初始化
        window.onload = () => {
            const today = new Date();
            document.getElementById('entryDate').valueAsDate = today;
            
            // 設定月份選擇器為當月 (例如 "2026-03")
            const yyyyMm = today.toISOString().slice(0, 7);
            document.getElementById('monthSelector').value = yyyyMm;
            
            // 啟動監聽當月資料
            listenToMonth(yyyyMm);
        };

        function changeMonth() {
            const selectedMonth = document.getElementById('monthSelector').value;
            listenToMonth(selectedMonth);
        }

        // 📡 監聽特定月份的資料
        function listenToMonth(monthStr) {
            // 如果之前有監聽別的月份，先斷開連線，節省效能
            if (currentListenerRef) currentListenerRef.off();
            
            currentListenerRef = db.ref(`cashierData/${monthStr}`);
            currentListenerRef.on('value', (snapshot) => {
                const dataObj = snapshot.val();
                const list = dataObj ? Object.keys(dataObj).map(key => ({ id: key, ...dataObj[key] })) : [];
                list.sort((a, b) => new Date(a.date) - new Date(b.date));
                renderTable(list);
            });
        }

        function checkVendor(val) {
            document.getElementById('customVendor').classList.toggle('hidden', val !== 'CUSTOM');
        }

        function addEntry() {
            const date = document.getElementById('entryDate').value;
            const select = document.getElementById('vendorSelect');
            let vendor = select.value === 'CUSTOM' ? document.getElementById('customVendor').value.trim() : select.value;
            
            if (!vendor) { alert("請輸入廠商名稱！"); return; }
            const qty = parseInt(document.getElementById('quantity').value) || 0;
            
            if (qty > 0) {
                // 自動判斷這筆紀錄屬於哪個月份
                const entryMonth = date.slice(0, 7); 
                const newRecord = { date, vendor, qty, price: qty * 65, timestamp: firebase.database.ServerValue.TIMESTAMP };
                
                // 寫入對應月份的資料夾
                db.ref(`cashierData/${entryMonth}`).push(newRecord);
                
                // 如果寫入的日期不是目前正在看的月份，自動幫你切換過去
                if (entryMonth !== document.getElementById('monthSelector').value) {
                    document.getElementById('monthSelector').value = entryMonth;
                    changeMonth();
                }

                // 寫入後重置介面
                document.getElementById('quantity').value = "1";
                document.getElementById('customVendor').value = "";
                document.getElementById('customVendor').classList.add('hidden');
                select.value = "俊丰";
            }
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            const foot = document.getElementById('tableFoot');
            let totalSum = 0;
            let vendorTotals = {};
            body.innerHTML = "";

            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="text-slate-400 py-4">這個月目前沒有紀錄喔！</td></tr>`;
                foot.innerHTML = "";
                return;
            }

            data.forEach((item) => {
                totalSum += item.price;
                vendorTotals[item.vendor] = (vendorTotals[item.vendor] || 0) + item.price;

                const row = body.insertRow();
                const day = new Date(item.date).getDay();
                if (day === 0 || day === 6) row.className = "weekend";
                
                row.insertCell(0).innerText = item.date.split('-').slice(1).join('/');
                row.insertCell(1).innerText = item.vendor;
                row.insertCell(2).innerText = "$" + item.price;
                const delCell = row.insertCell(3);
                // 刪除時，也要指定從哪個月份刪除
                const currentMonth = document.getElementById('monthSelector').value;
                delCell.innerHTML = `<button onclick="deleteItem('${currentMonth}', '${item.id}')" class="text-red-500 text-xl">❌</button>`;
            });

            let footHtml = "";
            for (let v in vendorTotals) {
                footHtml += `<tr class="vendor-summary"><td colspan="2">${v}</td><td colspan="2">$${vendorTotals[v]}</td></tr>`;
            }
            footHtml += `<tr class="bg-slate-800 text-white"><td colspan="2">本月總結</td><td colspan="2">$${totalSum}</td></tr>`;
            foot.innerHTML = footHtml;
        }

        function deleteItem(month, id) {
            if(confirm("確定刪除這筆紀錄？")) db.ref(`cashierData/${month}/${id}`).remove();
        }

        function clearCurrentMonth() {
            const currentMonth = document.getElementById('monthSelector').value;
            if(confirm(`⚠️ 注意！這會清空【${currentMonth}】所有的餐費紀錄，確定嗎？\n(其他月份的紀錄不會受到影響)`)) {
                db.ref(`cashierData/${currentMonth}`).remove();
            }
        }
    </script>
</body>
</html>

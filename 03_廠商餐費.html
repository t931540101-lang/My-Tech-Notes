<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廠商餐費 | 雙結點穩定版</title>
    <link rel="icon" href="IMG_0968.png">
    <link rel="apple-touch-icon" href="IMG_0968.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; padding: 15px; }
        .card { background: white; border: 2px solid #1e293b; border-radius: 12px; box-shadow: 4px 4px 0px #cbd5e1; margin-bottom: 20px; }
        input, select { border: 2px solid #cbd5e1; border-radius: 8px; padding: 12px; font-size: 18px; font-weight: bold; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 2px solid #1e293b; padding: 12px 8px; text-align: center; font-size: 16px; font-weight: bold; }
        th { background-color: #e2e8f0; }
        .period-header { background-color: #1e293b; color: #f8fafc; font-size: 14px; padding: 4px; }
        .vendor-junfeng { background-color: #dbeafe; }
        .vendor-xiangqing { background-color: #dcfce7; }
        .vendor-custom { background-color: #fef9c3; }
        .nav-btn { touch-action: manipulation; transition: transform 0.1s; }
        .nav-btn:active { transform: scale(0.8); }
        .success-flash { animation: flashGreen 0.5s ease-out; }
        @keyframes flashGreen { 0% { background-color: #10b981; transform: scale(0.95); } 100% { background-color: #059669; transform: scale(1); } }
    </style>
</head>
<body>

    <!-- 輸入區 -->
    <div class="card overflow-hidden">
        <div class="bg-slate-800 text-white p-4 flex justify-between items-center">
            <button onclick="changeMonth(-1)" class="nav-btn text-3xl px-4 py-2 bg-slate-700 rounded-lg shadow-inner">◀</button>
            <div class="text-center">
                <div class="text-xs text-slate-400 font-bold tracking-widest mb-1">PRECISION LEDGER</div>
                <h2 id="monthDisplay" class="text-3xl font-black tracking-wider">2026 / 03</h2>
            </div>
            <button onclick="changeMonth(1)" class="nav-btn text-3xl px-4 py-2 bg-slate-700 rounded-lg shadow-inner">▶</button>
        </div>

        <div class="p-5 space-y-4">
            <div class="flex items-center gap-2">
                <input type="date" id="entryDate" onchange="updatePeriodHint()">
                <span id="periodHint" class="whitespace-nowrap px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold">前期</span>
            </div>

            <div class="flex gap-2">
                <select id="vendorSelect" onchange="handleVendorChange(this.value)">
                    <option value="俊丰">俊丰</option>
                    <option value="祥箐">祥箐</option>
                    <option value="CUSTOM">➕ 自定義</option>
                </select>
                <div class="flex items-center border-2 border-slate-200 rounded-lg px-2">
                    <span class="text-slate-400 font-bold mr-1">份</span>
                    <input type="number" id="quantity" value="1" class="w-16 border-none p-2 text-center">
                </div>
            </div>

            <input type="text" id="customVendor" placeholder="請輸入廠商名稱" class="hidden">

            <!-- 單價顯示+可修改 -->
            <div class="flex items-center gap-2">
                <span class="text-slate-500 font-bold whitespace-nowrap">單價 $</span>
                <input type="number" id="unitPrice" value="65" class="text-center">
                <span class="text-slate-400 text-sm whitespace-nowrap">元／份</span>
            </div>

            <button id="submitBtn" onclick="addEntry()" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold text-xl shadow-lg transition-all duration-200">
                寫入帳單 ✍️
            </button>
        </div>
    </div>

    <!-- 表格區 -->
    <div class="card overflow-hidden">
        <div class="bg-slate-100 p-2 text-center border-b-2 border-slate-800 font-bold text-slate-600" id="tableHeader">載入中...</div>

        <!-- 廠商顏色說明 -->
        <div class="flex gap-3 p-3 border-b-2 border-slate-200 flex-wrap">
            <span class="px-3 py-1 rounded-full text-sm font-bold bg-blue-100 text-blue-700">🔵 俊丰</span>
            <span class="px-3 py-1 rounded-full text-sm font-bold bg-green-100 text-green-700">🟢 祥箐</span>
            <span class="px-3 py-1 rounded-full text-sm font-bold bg-yellow-100 text-yellow-700">🟡 其他</span>
        </div>

        <div class="overflow-x-auto">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th style="width: 20%;">日期</th>
                        <th>廠商</th>
                        <th style="width: 25%;">金額</th>
                        <th style="width: 15%;">🗑️</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot id="tableFoot"></tfoot>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI907S1YdCWor48",
            authDomain: "factor-security-d1965.firebaseapp.com",
            databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com",
            projectId: "factor-security-d1965",
            storageBucket: "factor-security-d1965.firebasestorage.app",
            messagingSenderId: "864846943143",
            appId: "1:864846943143:web:4cfa18cd20d2f712225c82"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentListenerRef = null;
        let viewYear = new Date().getFullYear();
        let viewMonth = new Date().getMonth() + 1;

        // 廠商預設單價
        const vendorPrices = { "俊丰": 65, "祥箐": 65 };

        // 廠商顏色對應
        function getVendorClass(vendor) {
            if (vendor === "俊丰") return "vendor-junfeng";
            if (vendor === "祥箐") return "vendor-xiangqing";
            return "vendor-custom";
        }

        window.onload = () => { updateView(); };

        function updatePeriodHint() {
            const dateStr = document.getElementById('entryDate').value;
            if (!dateStr) return;
            const d = parseInt(dateStr.split('-')[2]);
            const hint = document.getElementById('periodHint');
            if (d <= 20) {
                hint.innerText = "前期 (1-20)";
                hint.className = "whitespace-nowrap px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold";
            } else {
                hint.innerText = "後期 (21-末)";
                hint.className = "whitespace-nowrap px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-bold";
            }
        }

        function handleVendorChange(val) {
            document.getElementById('customVendor').classList.toggle('hidden', val !== 'CUSTOM');
            // 自動帶入該廠商的預設單價
            if (vendorPrices[val] !== undefined) {
                document.getElementById('unitPrice').value = vendorPrices[val];
            } else {
                document.getElementById('unitPrice').value = 65;
            }
        }

        function changeMonth(offset) {
            viewMonth += offset;
            if (viewMonth > 12) { viewMonth = 1; viewYear++; }
            if (viewMonth < 1) { viewMonth = 12; viewYear--; }
            updateView();
        }

        function updateView() {
            const mm = String(viewMonth).padStart(2, '0');
            document.getElementById('monthDisplay').innerText = `${viewYear} / ${mm}`;
            document.getElementById('tableHeader').innerText = `▼ ${viewYear}年 ${viewMonth}月 明細 ▼`;
            const dateInput = document.getElementById('entryDate');
            const today = new Date();
            if (today.getFullYear() === viewYear && (today.getMonth() + 1) === viewMonth) {
                dateInput.valueAsDate = today;
            } else {
                dateInput.value = `${viewYear}-${mm}-01`;
            }
            updatePeriodHint();
            listenToMonth(`${viewYear}-${mm}`);
        }

        function listenToMonth(monthStr) {
            if (currentListenerRef) currentListenerRef.off();
            currentListenerRef = db.ref(`cashierData/${monthStr}`);
            currentListenerRef.on('value', (snapshot) => {
                const dataObj = snapshot.val();
                const list = dataObj ? Object.keys(dataObj).map(key => ({ id: key, ...dataObj[key] })) : [];
                list.sort((a, b) => new Date(a.date) - new Date(b.date));
                renderTable(list);
            });
        }

        function addEntry() {
            const date = document.getElementById('entryDate').value;
            const select = document.getElementById('vendorSelect');
            let vendor = select.value === 'CUSTOM' ? document.getElementById('customVendor').value.trim() : select.value;
            if (!vendor) return alert("請輸入廠商！");
            if (!date) return alert("日期錯誤，請重新選擇！");

            const qty = parseInt(document.getElementById('quantity').value) || 0;
            const unitPrice = parseInt(document.getElementById('unitPrice').value) || 65;
            if (qty <= 0) return alert("份數必須大於 0");

            const entryMonth = date.slice(0, 7);
            const day = parseInt(date.split('-')[2]);
            const period = day <= 20 ? "A" : "B";

            const btn = document.getElementById('submitBtn');
            btn.innerText = "寫入中...";
            btn.disabled = true;

            db.ref(`cashierData/${entryMonth}`).push({ date, vendor, qty, price: qty * unitPrice, unitPrice, period })
              .then(() => {
                  document.getElementById('quantity').value = "1";
                  btn.innerText = "寫入帳單 ✍️";
                  btn.disabled = false;
                  btn.classList.add('success-flash');
                  setTimeout(() => btn.classList.remove('success-flash'), 500);
              })
              .catch((error) => {
                  alert("寫入失敗！\n錯誤：" + error.message);
                  btn.innerText = "寫入帳單 ✍️";
                  btn.disabled = false;
              });
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            const foot = document.getElementById('tableFoot');
            body.innerHTML = "";
            let sumA = 0, sumB = 0;
            let vendorTotals = {};

            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="py-10 text-slate-400 font-normal">尚無紀錄</td></tr>`;
                foot.innerHTML = ""; return;
            }

            let lastPeriod = "";
            data.forEach((item) => {
                if (item.period === 'A') sumA += item.price; else sumB += item.price;
                vendorTotals[item.vendor] = (vendorTotals[item.vendor] || 0) + item.price;

                if (lastPeriod !== "" && lastPeriod !== item.period) {
                    const sep = body.insertRow();
                    sep.innerHTML = `<td colspan="4" class="period-header">--- 21 號後（後期帳）---</td>`;
                }
                lastPeriod = item.period;

                const row = body.insertRow();
                row.className = getVendorClass(item.vendor);
                row.insertCell(0).innerText = item.date.split('-')[2] + "日";
                row.insertCell(1).innerText = item.vendor;
                row.insertCell(2).innerText = `$${item.price}`;
                const mm = String(viewMonth).padStart(2, '0');
                row.insertCell(3).innerHTML = `<button onclick="deleteItem('${viewYear}-${mm}', '${item.id}')">❌</button>`;
            });

            // 廠商分開小計
            let vendorRows = Object.entries(vendorTotals).map(([v, total]) =>
                `<tr class="${getVendorClass(v)}"><td colspan="2">　${v} 小計</td><td colspan="2">$${total}</td></tr>`
            ).join('');

            foot.innerHTML = `
                ${vendorRows}
                <tr class="bg-slate-100"><td colspan="2">前期小計</td><td colspan="2">$${sumA}</td></tr>
                <tr class="bg-slate-100"><td colspan="2">後期小計</td><td colspan="2">$${sumB}</td></tr>
                <tr class="bg-slate-800 text-white text-lg"><td colspan="2">本月總帳</td><td colspan="2">$${sumA + sumB}</td></tr>
            `;
        }

        function deleteItem(month, id) { if(confirm("刪除？")) db.ref(`cashierData/${month}/${id}`).remove(); }
    </script>
</body>
</html>

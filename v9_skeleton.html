<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>戰情中心 V9.0 | 旗艦骨架</title>
    <link rel="icon" href="2020123001.png">
    <link rel="apple-touch-icon" href="2020123001.png">
    <style>
        /* --- 系統全域變數 (深色戰術配色) --- */
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #4fc3f7; /* 科技藍 */
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333333;
            --danger: #ef5350;
        }
        
        body { 
            margin: 0; 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            user-select: none; /* 防止誤觸反白 */
        }

        /* --- 頂部狀態列 --- */
        .header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: var(--surface); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; box-sizing: border-box; 
            border-bottom: 1px solid var(--border); 
            z-index: 100; 
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header img { height: 30px; width: 30px; }
        .header-title { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
        .status-dot { 
            width: 10px; height: 10px; background: #4caf50; 
            border-radius: 50%; display: inline-block; 
            box-shadow: 0 0 8px #4caf50; 
        }
        
        /* --- 主要內容切換區 --- */
        .content { margin-top: 60px; margin-bottom: 70px; padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* --- 底部導覽列 --- */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 65px; 
            background: var(--surface); 
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid var(--border); 
            z-index: 100; 
            padding-bottom: env(safe-area-inset-bottom); /* 適配 iPhone 底部橫條 */
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            color: var(--text-muted); font-size: 12px; gap: 4px; 
            cursor: pointer; padding: 10px; flex: 1; transition: 0.2s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; }

        /* --- 內部元件 UI --- */
        .card { background: var(--surface); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        input[type="text"] { 
            width: 100%; padding: 12px; margin-top: 10px; 
            background: var(--bg); border: 1px solid var(--border); 
            color: var(--text); border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        button { 
            width: 100%; padding: 14px; background: var(--primary); 
            color: #000; font-weight: bold; border: none; 
            border-radius: 6px; margin-top: 15px; font-size: 16px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <img src="2020123001.png" alt="LOGO">
        <div class="header-title">戰情中心 V9.0</div>
    </div>
    <div><span class="status-dot"></span></div>
</div>

<div class="content">
    
    <div id="page-home" class="page">
        <div class="card">
            <h3 style="margin-top:0; color:var(--primary);">🛡️ 勤務簡報</h3>
            <p style="font-size: 14px; color: var(--text-muted);">
                登入人員：小黑哥<br>
                連線狀態：已連線至雲端主機
            </p>
        </div>
        <div class="card" style="border-left: 4px solid var(--danger);">
            <strong style="color:var(--danger);">⚠️ 最新通報</strong>
            <p style="font-size: 14px; margin-bottom:0;">請各單位加強夜間巡邏，落實盤查作業。</p>
        </div>
    </div>

    <div id="page-search" class="page">
        <div class="card">
            <strong>🔍 綜合資料查核</strong>
            <input type="text" placeholder="輸入身分證 / 車牌 / 姓名">
            <button>執 行 查 詢</button>
        </div>
        <p style="font-size: 12px; color: var(--text-muted); text-align: center;">此處將預留 Firebase 串接空間</p>
    </div>

    <div id="page-scan" class="page">
        <div class="card" style="text-align: center; padding: 40px 15px;">
            <div style="font-size: 40px; margin-bottom: 15px;">📷</div>
            <strong>光學辨識模組待命</strong>
            <p style="font-size: 14px; color: var(--text-muted);">點擊啟動相機進行車牌掃描</p>
            <button style="background: var(--surface); color: var(--primary); border: 1px solid var(--primary);">啟動相機</button>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div class="card">
            <strong>⚙️ 系統設定</strong>
            <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">本機環境與緩存管理</p>
            <button style="background: var(--surface); color: var(--text); border: 1px solid var(--border);" onclick="clearCache()">清除本機記憶</button>
            <button style="background: var(--danger); color: white; margin-top: 10px;">安全登出</button>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="switchPage('home', this)">
        <div class="nav-icon">🏠</div>
        <span>首頁</span>
    </div>
    <div class="nav-item" onclick="switchPage('search', this)">
        <div class="nav-icon">🔍</div>
        <span>查核</span>
    </div>
    <div class="nav-item" onclick="switchPage('scan', this)">
        <div class="nav-icon">📷</div>
        <span>掃描</span>
    </div>
    <div class="nav-item" onclick="switchPage('settings', this)">
        <div class="nav-icon">⚙️</div>
        <span>設定</span>
    </div>
</div>

<script>
    // --- 核心邏輯：頁面切換與 Local Storage 記憶 ---

    function switchPage(pageId, navElement) {
        // 1. 隱藏所有頁面與取消高亮
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        
        // 2. 顯示被點擊的頁面
        document.getElementById('page-' + pageId).classList.add('active');
        
        // 3. 處理按鈕高亮狀態
        if (navElement) {
            navElement.classList.add('active');
        } else {
            // 初始化時，自動找出對應的按鈕並高亮
            document.querySelector(`.nav-item[onclick*="${pageId}"]`).classList.add('active');
        }

        // 4. 將目前所在頁面存入 Local Storage
        localStorage.setItem('v9_last_page', pageId);
    }

    // 清除記憶功能
    function clearCache() {
        localStorage.removeItem('v9_last_page');
        alert("本機記憶已清除，下次重新載入將回到首頁。");
    }

    // --- 系統初始化 ---
    window.onload = () => {
        // 讀取上次停留的頁面，如果沒有紀錄就預設為 'home'
        const lastPage = localStorage.getItem('v9_last_page') || 'home';
        switchPage(lastPage, null);
    };
</script>
</body>
</html>

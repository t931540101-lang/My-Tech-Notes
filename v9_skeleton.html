<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>戰情中心 V9.0 | 旗艦版</title>
    <link rel="icon" href="2020123001.png">
    <link rel="apple-touch-icon" href="2020123001.png">
    <style>
        /* --- 系統全域變數 (深色戰術配色) --- */
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #4fc3f7; /* 科技藍 */
            --text: #ffffff;
            --text-muted: #888888;
            --border: #333333;
            --danger: #ef5350;
        }
        
        body { 
            margin: 0; font-family: -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            user-select: none; 
        }

        /* --- 1. 登入頁面 UI --- */
        #login-page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; padding: 20px; box-sizing: border-box;
            background: radial-gradient(circle at top, #1a2a3a 0%, var(--bg) 70%);
        }
        .login-logo { width: 80px; height: 80px; margin-bottom: 10px; }
        .login-title { font-size: 24px; font-weight: bold; color: var(--text); margin: 5px 0; }
        .login-subtitle { font-size: 14px; color: var(--primary); letter-spacing: 2px; margin-bottom: 30px; }
        
        .login-box { width: 100%; max-width: 350px; background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input[type="text"], .login-box input[type="password"] {
            width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 16px; box-sizing: border-box;
        }
        .shift-select { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 16px; }
        .shift-select label { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-muted); }
        .shift-select input[type="radio"]:checked + span { color: var(--primary); font-weight: bold; }
        
        /* --- 2. 主系統框架 --- */
        #main-app { display: none; } /* 預設隱藏主系統 */
        
        .header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: var(--surface); display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid var(--border); z-index: 100; 
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header img { height: 30px; width: 30px; }
        .status-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; box-shadow: 0 0 8px #4caf50; }
        
        .content { margin-top: 60px; margin-bottom: 70px; padding: 15px; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 65px; background: var(--surface); 
            display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); 
            z-index: 100; padding-bottom: env(safe-area-inset-bottom); 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 12px; gap: 4px; cursor: pointer; padding: 10px; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; }

        /* --- 共用元件 --- */
        .card { background: var(--surface); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        button { width: 100%; padding: 14px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-page">
    <img src="2020123001.png" alt="LOGO" class="login-logo">
    <div class="login-title">內政部警政署</div>
    <div class="login-subtitle">M-POLICE 戰情中心</div>
    
    <div class="login-box">
        <input type="text" id="pUser" placeholder="識別碼 (0905)">
        <input type="password" id="pPass" placeholder="通行密碼 (0905)">
        
        <div class="shift-select">
            <label><input type="radio" name="shift" value="日班" checked> <span>☀️ 日班</span></label>
            <label><input type="radio" name="shift" value="夜班"> <span>🌙 夜班</span></label>
        </div>
        
        <button onclick="doLogin()">安 全 登 入</button>
    </div>
</div>

<div id="main-app">
    <div class="header">
        <div class="header-left">
            <img src="2020123001.png" alt="LOGO">
            <div style="font-size: 18px; font-weight: bold;" id="sys-title">戰情中心 V9.0</div>
        </div>
        <div><span class="status-dot"></span></div>
    </div>

    <div class="content">
        <div id="page-home" class="page">
            <div class="card">
                <h3 style="margin-top:0; color:var(--primary);">🛡️ 勤務簡報</h3>
                <p style="font-size: 14px; color: var(--text-muted);">
                    登入人員：小黑哥 <br>
                    值勤班別：<span id="display-shift">讀取中...</span><br>
                    連線狀態：加密連線中
                </p>
            </div>
        </div>

        <div id="page-search" class="page">
            <div class="card">
                <strong>🔍 綜合資料查核</strong>
                <input type="text" placeholder="輸入身分證 / 車牌 / 姓名" style="width: 100%; padding: 12px; margin-top: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; box-sizing: border-box; font-size: 16px;">
                <button style="margin-top: 15px;">執 行 查 詢</button>
            </div>
            <p style="font-size: 12px; color: var(--text-muted); text-align: center;">Firebase 數據庫預備中...</p>
        </div>

        <div id="page-scan" class="page">
            <div class="card" style="text-align: center; padding: 40px 15px;">
                <div style="font-size: 40px; margin-bottom: 15px;">📷</div>
                <strong>光學辨識模組待命</strong>
                <button style="background: var(--surface); color: var(--primary); border: 1px solid var(--primary); margin-top: 15px;">啟動相機</button>
            </div>
        </div>

        <div id="page-settings" class="page">
            <div class="card">
                <strong>⚙️ 系統設定</strong>
                <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 20px;">帳號安全與系統管理</p>
                <button style="background: var(--danger); color: white;" onclick="doLogout()">安 全 登 出</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="switchPage('home', this)"><div class="nav-icon">🏠</div><span>首頁</span></div>
        <div class="nav-item" onclick="switchPage('search', this)"><div class="nav-icon">🔍</div><span>查核</span></div>
        <div class="nav-item" onclick="switchPage('scan', this)"><div class="nav-icon">📷</div><span>掃描</span></div>
        <div class="nav-item" onclick="switchPage('settings', this)"><div class="nav-icon">⚙️</div><span>設定</span></div>
    </div>
</div>

<script>
    // --- 登入與權限管理 ---
    function doLogin() {
        const u = document.getElementById('pUser').value;
        const p = document.getElementById('pPass').value;
        const s = document.querySelector('input[name="shift"]:checked').value;

        if(u === "0905" && p === "0905") {
            // 寫入本地記憶
            localStorage.setItem('v9_logged_in', 'true');
            localStorage.setItem('v9_shift', s);
            
            enterSystem(s);
        } else { 
            alert("識別碼或密碼錯誤，請重新輸入。"); 
        }
    }

    function doLogout() {
        localStorage.removeItem('v9_logged_in');
        localStorage.removeItem('v9_shift');
        localStorage.removeItem('v9_last_page');
        
        // 切換回登入畫面
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('login-page').style.display = 'flex';
        document.getElementById('pPass').value = ''; // 清空密碼
    }

    function enterSystem(shift) {
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('display-shift').innerText = shift;
        
        // 讀取上次停留的頁面
        const lastPage = localStorage.getItem('v9_last_page') || 'home';
        switchPage(lastPage, null);
    }

    // --- 頁面切換邏輯 ---
    function switchPage(pageId, navElement) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        
        document.getElementById('page-' + pageId).classList.add('active');
        
        if (navElement) {
            navElement.classList.add('active');
        } else {
            const defaultNav = document.querySelector(`.nav-item[onclick*="${pageId}"]`);
            if(defaultNav) defaultNav.classList.add('active');
        }
        localStorage.setItem('v9_last_page', pageId);
    }

    // --- 系統初始化 ---
    window.onload = () => {
        // 檢查是否已經登入過
        if(localStorage.getItem('v9_logged_in') === 'true') {
            const savedShift = localStorage.getItem('v9_shift') || '未知';
            enterSystem(savedShift);
        }
    };
</script>
</body>
</html>

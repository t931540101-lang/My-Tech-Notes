<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 大數據分析儀</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --gold: #ffd700; --up: #ff4d4d; --down: #00e676; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 100%; }
        h2 { text-align: center; color: var(--accent); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .status { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; }
        .price { font-size: 1.5rem; font-weight: bold; color: var(--gold); }
        .ai-verdict { margin-top: 15px; padding: 10px; border-radius: 8px; background: #2a2a2a; border-left: 4px solid var(--accent); }
        button { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .indicator { font-size: 0.85rem; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 AI 自動分析腳本</h2>
    <p style="font-size: 0.8rem; text-align: center; color: #888;">正在分析：比特幣 (BTC) 與 市場大數據</p>

    <div class="card">
        <div class="status" id="updateTime">上次更新：尚未更新</div>
        <div class="price-row">
            <span>目前現價 (USD)</span>
            <span class="price" id="currentPrice">---</span>
        </div>
        
        <div class="ai-verdict">
            <strong>📊 大數據分析結論：</strong>
            <div id="analysisResult" style="margin-top:5px;">請點擊下方按鈕開始分析...</div>
        </div>
        
        <div class="indicator" id="volatility">市場波動率：計算中...</div>
    </div>

    <button onclick="fetchData()">連線並執行自動分析</button>
</div>

<script>
    // 這裡使用 CoinGecko 的開放 API 作為演示，無需 API Key
    async function fetchData() {
        const resultDiv = document.getElementById('analysisResult');
        const priceSpan = document.getElementById('currentPrice');
        const timeSpan = document.getElementById('updateTime');
        
        resultDiv.innerHTML = "🌀 正在掃描網路數據並執行分析邏輯...";
        
        try {
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&include_24hr_change=true&vs_currencies=usd');
            const data = await response.json();
            const btc = data.bitcoin;
            
            // 數據處理
            const price = btc.usd;
            const change = btc.usd_24h_change;
            
            // 更新 UI
            priceSpan.innerText = `$${price.toLocaleString()}`;
            timeSpan.innerText = `上次更新：${new Date().toLocaleTimeString()}`;
            
            // 大數據分析邏輯 (簡單模擬)
            analyzeData(price, change);
            
            // 存入 Local Storage
            localStorage.setItem('last_price', price);
            
        } catch (error) {
            resultDiv.innerHTML = "❌ 連線失敗，請檢查網路或稍後再試。";
        }
    }

    function analyzeData(price, change) {
        const resultDiv = document.getElementById('analysisResult');
        let verdict = "";
        let color = "#e0e0e0";

        // 簡易大數據邏輯判斷
        if (change < -5) {
            verdict = "⚠️ 市場出現恐慌性拋售，大數據顯示目前處於「超跌」區間。適合小量布局，但需注意風險。";
            color = "#00e676";
        } else if (change > 5) {
            verdict = "🔥 目前漲幅過高，大數據顯示正處於「過熱」狀態，建議分批獲利了結，不宜追高。";
            color = "#ff4d4d";
        } else {
            verdict = "⚖️ 市場情緒穩定，目前價格波動在合理範圍。適合持續觀察，或設定網格交易。";
        }

        resultDiv.innerHTML = `<span style="color:${color}">${verdict}</span>`;
        document.getElementById('volatility').innerText = `24H 波動率：${change.toFixed(2)}%`;
    }
</script>

</body>
</html>

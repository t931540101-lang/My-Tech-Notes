<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑哥專屬 - 全球資產分析儀</title>
    <style>
        :root { --bg: #0d0d0d; --card: #1c1c1c; --accent: #00d2ff; --gold: #f39c12; --up: #ff4757; --down: #2ed573; --text: #f1f2f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        h2 { text-align: center; color: var(--accent); font-size: 1.2rem; }
        .dashboard { display: grid; gap: 12px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; border-left: 5px solid var(--accent); position: relative; }
        .label { font-size: 0.8rem; color: #a4b0be; margin-bottom: 5px; }
        .price { font-size: 1.6rem; font-weight: bold; color: var(--gold); }
        .status { font-size: 0.85rem; padding: 10px; background: #2f3542; border-radius: 8px; margin-top: 10px; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; font-size: 1rem; }
        .up { color: var(--up); }
        .down { color: var(--down); }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 全球數據自動化分析</h2>
    <p id="timer" style="text-align:center; font-size:0.75rem; color:#747d8c;">上次更新：尚未連線</p>
    
    <div class="dashboard" id="mainDashboard">
        <div class="card" style="border-left-color:#ff4757">
            <div class="label">台積電 (2330.TW)</div>
            <div id="price-2330" class="price">讀取中...</div>
            <div id="verdict-2330" class="status">正在同步台股大數據...</div>
        </div>

        <div class="card">
            <div class="label">比特幣 (BTC/USD)</div>
            <div id="price-btc" class="price">讀取中...</div>
            <div id="verdict-btc" class="status">分析雲端數據中...</div>
        </div>

        <div class="card" style="border-left-color:#f1c40f">
            <div class="label">黃金存摺參考 (GOLD)</div>
            <div id="price-gold" class="price">讀取中...</div>
            <div id="verdict-gold" class="status">計算避險情緒...</div>
        </div>
    </div>

    <button onclick="updateAll()">連線並執行深度分析</button>
</div>

<script>
    async function updateAll() {
        document.getElementById('timer').innerText = "🌀 大數據同步中...";
        
        try {
            // 1. 抓取加密貨幣與黃金 (使用 CoinGecko)
            const cryptoRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,pax-gold&vs_currencies=usd&include_24hr_change=true');
            const cryptoData = await cryptoRes.json();
            
            // 2. 模擬抓取台股 (由於 CORS 限制，實務上會使用 FinMind 代理或後端)
            // 這裡先以 API 模擬邏輯示範，小黑哥你可以直接看到分析結果
            const btc = cryptoData.bitcoin;
            const gold = cryptoData['pax-gold'];
            
            updateUI('btc', btc.usd, btc.usd_24h_change);
            updateUI('gold', gold.usd, gold.usd_24h_change);
            
            // 模擬台積電數據 (這部分我會教你如何串接真正的 FinMind 密鑰來達成 100% 真實)
            updateUI('2330', 1055, 1.2); 

            document.getElementById('timer').innerText = `上次更新：${new Date().toLocaleTimeString()}`;
        } catch (e) {
            alert("同步失敗，可能是 API 頻率限制，請稍後再試。");
        }
    }

    function updateUI(id, price, change) {
        const priceEl = document.getElementById(`price-${id}`);
        const verdictEl = document.getElementById(`verdict-${id}`);
        const colorClass = change >= 0 ? 'up' : 'down';
        const sign = change >= 0 ? '+' : '';

        priceEl.innerHTML = `$${price.toLocaleString()} <span class="${colorClass}" style="font-size:0.9rem">${sign}${change.toFixed(2)}%</span>`;
        
        // 專業分析語法
        if (change > 2) {
            verdictEl.innerText = "🔥 大數據：市場過熱，建議分批獲利。";
        } else if (change < -2) {
            verdictEl.innerText = "❄️ 大數據：處於超跌區間，觀察支撐力道。";
        } else {
            verdictEl.innerText = "⚖️ 大數據：盤勢震盪，適合定期定額。";
        }
    }
</script>

</body>
</html>

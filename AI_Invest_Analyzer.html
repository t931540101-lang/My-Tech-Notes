<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投資旗艦分析儀 - 小黑哥專屬</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --text: #d1d1d1; --accent: #a29bfe; --gold: #f1c40f; --up: #ff5252; --down: #2ecc71; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; line-height: 1.4; }
        h2 { text-align: center; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }
        .dashboard { display: grid; gap: 10px; }
        .item-card { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #333; transition: 0.3s; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .symbol { font-weight: bold; font-size: 1rem; color: var(--text); }
        .price { font-size: 1.2rem; font-weight: 800; color: var(--gold); }
        .analysis-box { background: #252525; padding: 8px; border-radius: 6px; font-size: 0.85rem; margin-top: 8px; border-left: 3px solid var(--accent); }
        .meta { font-size: 0.75rem; color: #777; margin-top: 5px; display: flex; justify-content: space-between; }
        button { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(162, 155, 254, 0.3); }
        .up-text { color: var(--up); }
        .down-text { color: var(--down); }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 AI 投資旗艦分析儀</h2>
    <div id="updateLabel" style="text-align:center; font-size:0.7rem; color:#555; margin-bottom:10px;">最後同步：未連線</div>
    
    <div class="dashboard" id="mainDashboard">
        <div style="text-align:center; padding:20px;">等待數據加載...</div>
    </div>

    <button onclick="fetchAllData()">執行全自動數據同步</button>
</div>

<script>
    // 預設追蹤清單
    const targets = [
        { id: 'bitcoin', name: '比特幣 (BTC)', symbol: 'BTC' },
        { id: 'ethereum', name: '以太幣 (ETH)', symbol: 'ETH' },
        { id: 'pax-gold', name: '實體黃金代幣 (GOLD)', symbol: 'GOLD' },
        { id: 'tsmc', name: '台積電 ADR (TSM)', symbol: 'TSM' }
    ];

    async function fetchAllData() {
        const dashboard = document.getElementById('mainDashboard');
        const updateLabel = document.getElementById('updateLabel');
        
        try {
            // 使用 CoinGecko API 獲取數據
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,pax-gold,tsmc&vs_currencies=usd&include_24hr_change=true');
            const data = await response.json();
            
            dashboard.innerHTML = '';
            updateLabel.innerText = `最後同步：${new Date().toLocaleTimeString()}`;

            targets.forEach(target => {
                const info = data[target.id];
                if (info) {
                    renderCard(target, info);
                }
            });

            // 存入 Local Storage 備份
            localStorage.setItem('last_market_data', JSON.stringify(data));

        } catch (error) {
            dashboard.innerHTML = '<div style="color:red; text-align:center;">連線頻率過快，請稍後再試</div>';
        }
    }

    function renderCard(target, info) {
        const price = info.usd;
        const change = info.usd_24h_change || 0;
        const changeClass = change >= 0 ? 'up-text' : 'down-text';
        const sign = change >= 0 ? '+' : '';

        // AI 邏輯判斷
        let aiVerdict = "";
        if (change < -4) {
            aiVerdict = "💎 大數據顯示超跌，盤勢恐慌中，具備反彈潛力。";
        } else if (change > 4) {
            aiVerdict = "🚀 漲勢強勁，目前處於過熱區間，建議戒急用忍。";
        } else {
            aiVerdict = "📊 走勢平穩，適合網格交易或持續持有。";
        }

        const cardHtml = `
            <div class="item-card">
                <div class="header-row">
                    <span class="symbol">${target.name}</span>
                    <span class="${changeClass}" style="font-weight:bold;">${sign}${change.toFixed(2)}%</span>
                </div>
                <div class="price">$${price.toLocaleString()}</div>
                <div class="analysis-box">
                    <strong>AI 分析：</strong> ${aiVerdict}
                </div>
                <div class="meta">
                    <span>資產類別: 核心觀察</span>
                    <span>穩定度: 優</span>
                </div>
            </div>
        `;
        document.getElementById('mainDashboard').innerHTML += cardHtml;
    }

    // 初始化讀取上次數據
    window.onload = () => {
        const cached = localStorage.getItem('last_market_data');
        if (cached) {
            // 這裡可以選擇是否預加載舊數據
            fetchAllData(); 
        }
    };
</script>

</body>
</html>

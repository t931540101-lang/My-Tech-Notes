<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Web Service 整合版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #0d6efd; --dark-bg: #222; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f9fa; margin: 0; min-height: 100vh; }

        /* 導覽列 */
        .navbar-custom { background-color: var(--dark-bg); padding: 10px 20px; }
        .nav-link { color: #888 !important; cursor: pointer; transition: 0.3s; }
        .nav-link.active { color: #fff !important; font-weight: bold; }
        .lang-btn { width: 35px; height: 35px; border-radius: 50%; border: none; margin-left: 8px; font-size: 0.7rem; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; }
        
        /* 容器與卡片 */
        .page-section { display: none; padding-top: 40px; position: relative; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-card { max-width: 1000px; margin: 0 auto 40px; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .section-title { text-align: center; font-size: 1.8rem; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .form-label { font-size: 0.85rem; color: #666; }
        .form-control:disabled { background-color: #f0f0f0; }

        /* 首頁專屬樣式 */
        .home-hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .home-title { font-size: 4rem; font-weight: 700; }
        .home-subtitle { font-size: 1.5rem; color: #888; font-weight: 300; }
        .deco-img { position: absolute; z-index: -1; opacity: 0.1; filter: grayscale(1); width: 250px; }

        /* 底部裝飾 */
        .footer-info { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 30px; }
        .theme-toggle { position: fixed; bottom: 10px; right: 10px; background-color: #4b39d7; color: white; border: none; padding: 5px 15px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container-fluid">
        <div class="navbar-brand"><img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" style="width:24px; filter:invert(1);"></div>
        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" onclick="showPage('home')">首頁</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showPage('leave')">請假單</a></li>
                <li class="nav-item"><a class="nav-link" onclick="showPage('unclocked')">未刷單</a></li>
            </ul>
        </div>
        <div class="d-flex align-items-center">
            <div class="lang-btn" style="background:#e67e22">TW</div>
            <div class="lang-btn" style="background:#d35400">TH</div>
            <div class="lang-btn" style="background:#e74c3c">ID</div>
        </div>
    </div>
</nav>

<section id="home" class="page-section active">
    <img src="https://cdn-icons-png.flaticon.com/512/0/191.png" class="deco-img" style="top:10%; left:5%;">
    <img src="https://cdn-icons-png.flaticon.com/512/0/191.png" class="deco-img" style="bottom:10%; right:5%;">
    <div class="home-hero">
        <h1 class="home-title">HR web service</h1>
        <p class="home-subtitle">Designed for IT</p>
        <div class="footer-info" style="margin-top: 100px;">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png" style="width:20px; opacity:0.5;"><br>
            © APEX DYNAMICS 2026
        </div>
    </div>
</section>

<section id="leave" class="page-section">
    <div class="container">
        <div class="main-card">
            <h2 class="section-title">請假單</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">身分證號後四碼</label>
                    <div class="input-group mb-3"><input type="password" class="form-control" value="1234"><span class="input-group-text bg-transparent">👁️</span></div>
                    <label class="form-label">工號</label><input type="text" class="form-control mb-3" placeholder="d01762">
                    <label class="form-label">姓名</label><input type="text" class="form-control mb-3" disabled>
                    <label class="form-label">請假名稱</label><select class="form-select mb-3"><option>請選擇...</option></select>
                    <label class="form-label">開始時間</label><input type="date" class="form-control mb-3">
                    <label class="form-label">結束時間</label><input type="date" class="form-control mb-3">
                </div>
                <div class="col-md-6">
                    <label class="form-label">部門</label><input type="text" class="form-control mb-3" disabled>
                    <label class="form-label">1級主管</label><input type="text" class="form-control mb-3" disabled>
                    <label class="form-label">2級主管</label><input type="text" class="form-control mb-3" disabled>
                    <label class="form-label">未休時數</label><input type="text" class="form-control mb-3" disabled>
                    <label class="form-label">預計請假時數</label><input type="text" class="form-control mb-3">
                </div>
            </div>
            <div class="text-center mt-4">
                <button class="btn btn-primary px-4 me-2" style="background:#0044cc">查詢</button>
                <button class="btn btn-primary px-4" style="background:#4488ff">送出</button>
            </div>
            <div class="footer-info">© APEX DYNAMICS 2026</div>
        </div>
    </div>
</section>

<section id="unclocked" class="page-section">
    <div class="container">
        <div class="main-card" style="max-width: 900px;">
            <button class="btn btn-primary mb-4">申請紀錄</button>
            <h2 class="section-title">未刷單</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">工號</label><input type="text" class="form-control mb-3">
                    <label class="form-label">未刷卡原因</label>
                    <select class="form-select mb-3"><option>未帶卡</option><option>忘記刷卡</option></select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">身分證號後四碼</label>
                    <div class="input-group mb-3"><input type="password" class="form-control"><span class="input-group-text bg-transparent">👁️</span></div>
                    <label class="form-label">未刷卡時間</label><input type="date" class="form-control mb-3">
                </div>
            </div>
            <button class="btn btn-primary px-5 mt-4">送出</button>
            <div class="footer-info">© APEX DYNAMICS 2026</div>
        </div>
    </div>
</section>

<button class="theme-toggle">Toggle theme ▾</button>

<script>
    function showPage(pageId) {
        // 1. 隱藏所有頁面
        document.querySelectorAll('.page-section').forEach(section => {
            section.classList.remove('active');
        });
        // 2. 顯示點選的頁面
        document.getElementById(pageId).classList.add('active');
        
        // 3. 更新導覽列狀態
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active');
            if(link.getAttribute('onclick').includes(pageId)) {
                link.classList.add('active');
            }
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SECURITY HQ | 權限控管中心</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --hq-primary: #00e5ff;
            --hq-bg: #0f172a;
            --hq-card: #1e293b;
            --hq-border: #334155;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: var(--hq-bg); 
            color: #f8fafc; font-family: -apple-system, "Microsoft JhengHei", sans-serif;
        }

        .top-nav {
            background: #000; border-bottom: 3px solid var(--hq-primary);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }

        .nav-tabs { display: flex; background: #111; overflow-x: auto; }
        .tab { flex: 1; text-align: center; padding: 18px 10px; cursor: pointer; color: #94a3b8; font-weight: bold; transition: 0.3s; }
        .tab.active { color: var(--hq-primary); background: #1e293b; border-bottom: 3px solid var(--hq-primary); }

        .content-container { padding: 15px; }

        /* 授權發放卡片 */
        .auth-card {
            background: var(--hq-card); border-radius: 12px; border: 2px solid var(--hq-border);
            padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .auth-header { color: var(--hq-primary); font-size: 20px; font-weight: 900; margin-top: 0; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        
        .input-group { margin-bottom: 15px; }
        .input-label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; display: block; }
        .input-field {
            width: 100%; background: #0f172a; border: 1.5px solid var(--hq-border);
            padding: 14px; color: white; border-radius: 8px; font-size: 16px; outline: none;
        }
        .input-field:focus { border-color: var(--hq-primary); }

        .btn-issue {
            width: 100%; background: var(--hq-primary); color: #0f172a;
            padding: 16px; font-weight: 900; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; letter-spacing: 4px; margin-top: 10px;
        }

        /* 授權名單 */
        .guard-list { margin-top: 20px; }
        .guard-item {
            background: #162030; padding: 15px; border-radius: 10px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--success);
        }
        .guard-info { display: flex; flex-direction: column; }
        .guard-name { font-size: 18px; font-weight: bold; color: #fff; }
        .guard-pwd { font-size: 13px; color: var(--hq-primary); font-family: monospace; margin-top: 4px; }
        .btn-revoke { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-revoke:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div style="font-weight:900; font-size:18px;">M-SECURITY HQ</div>
        <div style="font-size:12px; color:var(--hq-primary);">值班人：盧家慶</div>
    </div>

    <nav class="nav-tabs">
        <div class="tab" onclick="location.href='hq_main.html'">即時通報</div>
        <div class="tab" onclick="location.href='hq_deploy.html'">名單部署</div>
        <div class="tab active">權限控管</div>
    </nav>

    <div class="content-container">
        
        <div class="auth-card">
            <h3 class="auth-header">🛡️ 核發人員值勤授權</h3>
            <div class="input-group">
                <span class="input-label">弟兄姓名 (將作為登入帳號)</span>
                <input type="text" id="guardName" class="input-field" placeholder="請輸入姓名">
            </div>
            <div class="input-group">
                <span class="input-label">設定授權密碼 (建議使用工號)</span>
                <input type="text" id="guardPwd" class="input-field" placeholder="請輸入密碼">
            </div>
            <button class="btn-issue" onclick="issueAuth()">核發電子通行證</button>
        </div>

        <div class="guard-list" id="guardContainer">
            <h4 style="margin-left: 5px; color: #94a3b8; letter-spacing: 1px;">🟢 目前已授權人員</h4>
            <div style="text-align: center; padding: 40px; color: #555;">正在掃描權限資料庫...</div>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", projectId: "factor-security-d1965" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        // 核發授權邏輯
        function issueAuth() {
            const name = document.getElementById('guardName').value.trim();
            const pwd = document.getElementById('guardPwd').value.trim();
            if(!name || !pwd) return alert("姓名與密碼為必填欄位！");

            db.ref('guard_accounts/' + name).set({
                password: pwd,
                grantedAt: new Date().toLocaleString(),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                alert(`✅ 授權成功！\n值勤弟兄「${name}」現在已可登入前線系統。`);
                document.getElementById('guardName').value = '';
                document.getElementById('guardPwd').value = '';
            });
        }

        // 監聽並載入授權名單
        db.ref('guard_accounts').on('value', snap => {
            const container = document.getElementById('guardContainer');
            container.innerHTML = '<h4 style="margin-left: 5px; color: #94a3b8; letter-spacing: 1px;">🟢 目前已授權人員</h4>';
            
            if(!snap.exists()) {
                container.innerHTML += '<div style="text-align:center; padding:30px; color:#555;">尚未核發任何人員授權</div>';
                return;
            }

            snap.forEach(child => {
                const name = child.key;
                const d = child.val();
                container.innerHTML += `
                    <div class="guard-item">
                        <div class="guard-info">
                            <span class="guard-name">${name}</span>
                            <span class="guard-pwd">授權密碼：${d.password}</span>
                        </div>
                        <button class="btn-revoke" onclick="revokeAuth('${name}')">撤銷權限</button>
                    </div>
                `;
            });
        });

        // 撤銷授權
        function revokeAuth(name) {
            if(confirm(`⚠️ 警告：撤銷 [${name}] 的權限後，該弟兄將立即被踢出系統且無法再次登入。確定執行？`)) {
                db.ref('guard_accounts/' + name).remove().then(() => {
                    alert(`已撤銷 ${name} 的存取權限。`);
                });
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SECURITY HQ | 名單部署房</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --hq-primary: #00e5ff;
            --hq-bg: #0f172a;
            --hq-card: #1e293b;
            --hq-border: #334155;
            --danger: #ef4444;
            --vip-gold: #f1c40f;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; background-color: var(--hq-bg); 
            color: #f8fafc; font-family: -apple-system, "Microsoft JhengHei", sans-serif;
        }

        /* 導覽條 */
        .top-nav {
            background: #000; border-bottom: 3px solid var(--hq-primary);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }

        .nav-tabs { display: flex; background: #111; overflow-x: auto; }
        .tab { flex: 1; text-align: center; padding: 18px 10px; cursor: pointer; color: #94a3b8; font-weight: bold; transition: 0.3s; }
        .tab.active { color: var(--hq-primary); background: #1e293b; border-bottom: 3px solid var(--hq-primary); }

        .content-container { padding: 15px; }

        /* 部署工具卡片 */
        .deploy-card {
            background: var(--hq-card); border-radius: 12px; border: 1.5px solid var(--hq-border);
            padding: 20px; margin-bottom: 20px;
        }
        .input-group { margin-bottom: 15px; }
        .input-label { font-size: 12px; color: var(--hq-primary); font-weight: bold; margin-bottom: 5px; display: block; }
        .input-field {
            width: 100%; background: #0f172a; border: 1px solid var(--hq-border);
            padding: 12px; color: white; border-radius: 8px; font-size: 16px;
        }
        .btn-deploy {
            width: 100%; background: var(--hq-primary); color: #0f172a;
            padding: 15px; font-weight: 900; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
        }

        /* 名單清單區 */
        .list-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .list-btn { 
            flex: 1; padding: 10px; border: 1px solid var(--hq-border); background: transparent; 
            color: #94a3b8; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
        .list-btn.active { background: var(--hq-primary); color: #000; border-color: var(--hq-primary); }

        .data-list { max-height: 500px; overflow-y: auto; }
        .data-item {
            background: #162030; padding: 15px; border-radius: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #334155;
        }
        .data-item.vip { border-left-color: var(--vip-gold); }
        .info-name { font-size: 18px; font-weight: bold; display: block; }
        .info-sub { font-size: 12px; color: #64748b; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }

        @media (max-width: 600px) { .data-item { flex-direction: column; align-items: flex-start; gap: 10px; } .btn-delete { width: 100%; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <div style="font-weight:900; font-size:18px;">M-SECURITY HQ</div>
        <div style="font-size:12px; color:var(--hq-primary);">指揮官：盧家慶</div>
    </div>

    <nav class="nav-tabs">
        <div class="tab" onclick="location.href='hq_main.html'">即時戰情</div>
        <div class="tab active">名單部署</div>
        <div class="tab">權限控管</div>
    </nav>

    <div class="content-container">
        
        <div class="deploy-card">
            <h3 style="margin-top:0; color:var(--hq-primary);">🚀 快速部署名單</h3>
            <div class="list-selector">
                <button id="type-emp" class="list-btn active" onclick="setDeployType('employee')">一般員工</button>
                <button id="type-vip" class="list-btn" onclick="setDeployType('vip')">VIP 貴賓</button>
            </div>
            
            <div class="input-group">
                <span class="input-label">姓名</span>
                <input type="text" id="targetName" class="input-field" placeholder="請輸入姓名">
            </div>
            <div class="input-group">
                <span class="input-label">車牌 / 工號</span>
                <input type="text" id="targetId" class="input-field" placeholder="請輸入車牌或工號">
            </div>
            <button class="btn-deploy" onclick="executeDeploy()">確認部署至雲端</button>
        </div>

        <div class="deploy-card">
            <h3 style="margin-top:0; color:var(--hq-primary);">📂 名單庫監控</h3>
            <div class="list-selector">
                <button id="show-emp" class="list-btn active" onclick="switchListView('employee')">員工清單</button>
                <button id="show-vip" class="list-btn" onclick="switchListView('vip')">VIP 清單</button>
            </div>
            <div id="data-display" class="data-list">
                </div>
        </div>

    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", projectId: "factor-security-d1965" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        let currentDeployType = 'employee';
        let currentViewType = 'employee';

        function setDeployType(type) {
            currentDeployType = type;
            document.getElementById('type-emp').className = type === 'employee' ? 'list-btn active' : 'list-btn';
            document.getElementById('type-vip').className = type === 'vip' ? 'list-btn active' : 'list-btn';
        }

        function switchListView(type) {
            currentViewType = type;
            document.getElementById('show-emp').className = type === 'employee' ? 'list-btn active' : 'list-btn';
            document.getElementById('show-vip').className = type === 'vip' ? 'list-btn active' : 'list-btn';
            loadListData();
        }

        // 執行部署
        function executeDeploy() {
            const name = document.getElementById('targetName').value.trim();
            const id = document.getElementById('targetId').value.trim().toUpperCase();
            if(!name || !id) return alert("請填寫完整資料！");

            const path = currentDeployType === 'employee' ? 'employee_list' : 'vip_list';
            const data = { name: name, plate: id, id: id, timestamp: Date.now() };

            db.ref(path).push(data).then(() => {
                alert("✅ 部署成功！前線人員已可同步查驗。");
                document.getElementById('targetName').value = '';
                document.getElementById('targetId').value = '';
            });
        }

        // 載入清單資料
        function loadListData() {
            const path = currentViewType === 'employee' ? 'employee_list' : 'vip_list';
            db.ref(path).on('value', snap => {
                const container = document.getElementById('data-display');
                container.innerHTML = '';
                if(!snap.exists()) { container.innerHTML = '<div style="text-align:center; color:#555;">暫無資料</div>'; return; }

                snap.forEach(child => {
                    const d = child.val();
                    const isVip = currentViewType === 'vip';
                    container.innerHTML += `
                        <div class="data-item ${isVip?'vip':''}">
                            <div>
                                <span class="info-name">${d.name} ${isVip?'⭐':''}</span>
                                <span class="info-sub">辨識碼：${d.plate}</span>
                            </div>
                            <button class="btn-delete" onclick="deleteRecord('${path}', '${child.key}')">撤除部署</button>
                        </div>
                    `;
                });
            });
        }

        // 刪除資料
        function deleteRecord(path, key) {
            if(confirm("確定要撤除此筆部署資料嗎？撤除後前線將無法查驗。")) {
                db.ref(`${path}/${key}`).remove();
            }
        }

        // 初始載入
        loadListData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SECURITY HQ | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --hq-cyan: #00f2ff;
            --hq-bg: #050505;
            --hq-panel: rgba(20, 20, 20, 0.95);
            --hq-border: #333;
            --hq-text-dim: #94a3b8;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--hq-bg); 
            color: white; 
            font-family: -apple-system, "Microsoft JhengHei", sans-serif;
        }

        /* === 🚪 戰術門鎖 (修正靠左佈局) === */
        #login-gate {
            display: flex; height: 100vh; align-items: center; justify-content: flex-start;
            padding-left: 10vw; background-color: var(--hq-bg); position: relative; z-index: 100;
        }
        .login-panel { width: 100%; max-width: 350px; padding: 20px; }
        .input-field {
            width: 100%; background: #000; border: 1px solid #444; border-left: 4px solid var(--hq-cyan);
            padding: 15px; color: white; margin-bottom: 20px; outline: none;
        }

        /* === 🛡️ HQ 主系統 (手機優化版) === */
        #main-system { display: none; min-height: 100vh; flex-direction: column; }
        
        .top-bar {
            background: #000; border-bottom: 2px solid var(--hq-cyan);
            padding: 15px; display: flex; justify-content: space-between; align-items: center;
        }

        .nav-tabs { 
            display: flex; background: #111; overflow-x: auto; white-space: nowrap; 
            -webkit-overflow-scrolling: touch;
        }
        .tab { padding: 15px 25px; cursor: pointer; color: var(--hq-text-dim); font-weight: bold; }
        .tab.active { color: var(--hq-cyan); background: #1a1a1a; border-bottom: 3px solid var(--hq-cyan); }

        /* 📱 響應式網格：電腦 3 欄，手機變 1 欄 */
        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px; padding: 15px;
        }

        .monitor-card {
            background: var(--hq-panel); border: 1px solid var(--hq-border);
            border-radius: 8px; display: flex; flex-direction: column; min-height: 400px;
        }

        .card-header {
            padding: 12px 15px; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--hq-border); color: var(--hq-cyan);
            font-weight: 900; font-size: 14px; display: flex; justify-content: space-between;
        }

        .scroll-content { flex: 1; overflow-y: auto; padding: 15px; }

        /* 狀態方塊小優化 */
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { 
            background: #000; border: 1px solid #222; padding: 12px; border-radius: 6px; 
            text-align: center; border-left: 3px solid var(--hq-cyan); 
        }
        .stat-val { font-size: 20px; font-weight: 900; color: var(--hq-cyan); }

        .log-entry { 
            padding: 10px; border-bottom: 1px solid #1a1a1a; font-size: 13px; 
            background: rgba(255,255,255,0.02); margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            #login-gate { padding-left: 0; justify-content: center; }
            .top-bar { flex-direction: column; text-align: center; gap: 10px; }
            .dashboard-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="login-panel">
            <h1 style="color:white; font-size:32px; letter-spacing:5px; margin-bottom:5px;">M-SECURITY</h1>
            <div style="color:var(--hq-cyan); font-weight:bold; margin-bottom:30px;">COMMAND CENTER HQ</div>
            <input type="text" id="hqUser" class="input-field" placeholder="COMMANDER NAME">
            <input type="password" id="hqPass" class="input-field" placeholder="ACCESS CODE">
            <button onclick="verifyHQAccess()" style="width:100%; background:var(--hq-cyan); padding:15px; font-weight:900; border:none; cursor:pointer;">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="main-system">
        <div class="top-bar">
            <div style="font-weight:900; font-size:20px; color:white; letter-spacing:2px;">M-SECURITY HQ</div>
            <div style="color:var(--hq-cyan); font-size:11px;">COMMANDER: <span id="commander-name">盧家慶</span></div>
        </div>

        <nav class="nav-tabs">
            <div class="tab active">戰術監控</div>
            <div class="tab">數據部署</div>
            <div class="tab">人員授權</div>
        </nav>

        <div class="dashboard-container">
            <div class="monitor-card" style="min-height: auto;">
                <div class="card-header">📊 運行狀態</div>
                <div class="scroll-content">
                    <div class="stat-grid">
                        <div class="stat-box"><span class="stat-val">ON</span><div style="font-size:10px;">NET</div></div>
                        <div class="stat-box"><span class="stat-val" id="count-visitor">0</span><div style="font-size:10px;">SITES</div></div>
                    </div>
                </div>
            </div>

            <div class="monitor-card">
                <div class="card-header">📡 即時日誌 <span>LIVE</span></div>
                <div id="hq-log-feed" class="scroll-content">
                    <div class="log-entry">等待日誌傳輸中...</div>
                </div>
            </div>

            <div class="monitor-card">
                <div class="card-header">⚡ 快速部署</div>
                <div class="scroll-content">
                    <input type="text" id="eName" style="background:#000; color:white; padding:12px; margin-bottom:10px; border:1px solid #444;" placeholder="員工姓名">
                    <input type="text" id="ePlate" style="background:#000; color:white; padding:12px; margin-bottom:10px; border:1px solid #444;" placeholder="車牌">
                    <button onclick="saveEmployee()" style="width:100%; background:var(--hq-cyan); padding:12px; font-weight:900; border:none;">即時部署</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", projectId: "factor-security-d1965" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();

        function verifyHQAccess() {
            const user = document.getElementById('hqUser').value;
            const pass = document.getElementById('hqPass').value;
            if (user === '盧家慶' && pass === 'D01762') {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('main-system').style.display = 'flex';
                startHQMonitor();
            } else { alert('拒絕存取'); }
        }

        function startHQMonitor() {
            // 1. 監聽訪客人數
            db.ref('visitor_logs').on('value', snap => {
                let count = 0; snap.forEach(c => { if(!c.val().leaveTime) count++; });
                document.getElementById('count-visitor').innerText = count;
            });

            // 2. 監聽前線查詢日誌
            db.ref('search_logs').limitToLast(15).on('value', snap => {
                const feed = document.getElementById('hq-log-feed'); feed.innerHTML = '';
                snap.forEach(c => {
                    const d = c.val();
                    feed.innerHTML = `<div class="log-entry"><span style="color:var(--hq-cyan)">[${d.time}]</span> <b>${d.user}</b> 查詢了 <b>${d.query}</b></div>` + feed.innerHTML;
                });
            });
        }

        function saveEmployee() {
            const n = document.getElementById('eName').value;
            const p = document.getElementById('ePlate').value.toUpperCase();
            if(!n || !p) return alert("資料不全");
            db.ref('employee_list').push({ name: n, plate: p, id: "HQ-" + Date.now().toString().slice(-4) }).then(() => {
                alert("部署成功");
                document.getElementById('eName').value = ''; document.getElementById('ePlate').value = '';
            });
        }
    </script>
</body>
</html>

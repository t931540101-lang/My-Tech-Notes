<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作打卡系統 - 專業版</title>
    <style>
        :root { --primary-color: #007AFF; --bg-color: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: white; width: 100%; max-width: 360px; padding: 25px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1c1c1e; margin-top: 0; font-size: 1.2rem; }
        .date-display { text-align: center; color: #8e8e93; font-size: 0.9rem; margin-bottom: 5px; }
        .time-display { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 25px; color: var(--primary-color); font-variant-numeric: tabular-nums; }
        .btn-group { display: flex; gap: 12px; margin-bottom: 20px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-in { background-color: #34C759; }
        .btn-out { background-color: #FF3B30; }
        button:active { opacity: 0.7; }
        .log-header { font-size: 0.85rem; color: #8e8e93; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .log-container { max-height: 250px; overflow-y: auto; }
        .log-item { font-size: 0.85rem; padding: 8px 0; border-bottom: 1px solid #f2f2f7; display: flex; justify-content: space-between; }
        .log-type { font-weight: bold; }
        .log-time { color: #3a3a3c; }
    </style>
</head>
<body>

<div class="card">
    <div id="fullDate" class="date-display">載入中...</div>
    <div id="clock" class="time-display">00:00:00</div>
    
    <div class="btn-group">
        <button class="btn-in" onclick="logTime('上班')">上班</button>
        <button class="btn-out" onclick="logTime('下班')">下班</button>
    </div>

    <div class="log-header">最近打卡紀錄</div>
    <div class="log-container" id="logHistory"></div>
    
    <button style="width:100%; background:none; color:#8e8e93; font-size:0.8rem; margin-top:15px; text-decoration:underline;" onclick="clearLogs()">清除本地紀錄</button>
</div>

<script>
    const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

    function updateClock() {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const w = weekDays[now.getDay()];
        
        document.getElementById('fullDate').innerText = `${y}年${m}月${d}日 (星期${w})`;
        document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });
    }
    setInterval(updateClock, 1000);

    function logTime(type) {
        const now = new Date();
        const y = now.getFullYear();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const w = weekDays[now.getDay()];
        const time = now.toLocaleTimeString('zh-TW', { hour12: false });
        
        const timeStr = `${m}/${d}(${w}) ${time}`;
        const entry = { type, time: timeStr };

        let history = JSON.parse(localStorage.getItem('punchLogs')) || [];
        history.unshift(entry);
        localStorage.setItem('punchLogs', JSON.stringify(history));
        
        renderLogs();
    }

    function renderLogs() {
        const history = JSON.parse(localStorage.getItem('punchLogs')) || [];
        const container = document.getElementById('logHistory');
        container.innerHTML = history.map(item => `
            <div class="log-item">
                <span class="log-type" style="color:${item.type==='上班'?'#34C759':'#FF3B30'}">${item.type}</span>
                <span class="log-time">${item.time}</span>
            </div>
        `).join('');
    }

    function clearLogs() {
        if(confirm('小黑哥，確定要清空紀錄嗎？')) {
            localStorage.removeItem('punchLogs');
            renderLogs();
        }
    }

    renderLogs();
    updateClock();
</script>

</body>
</html>
